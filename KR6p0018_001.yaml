body:
  text: 明永樂吳郡沙門大佑解天啓天台沙門傳燈鈔次釋解文分二初釋題解次釋經解初又二初題解二譯人初題解又二初標題佛說阿彌陀經二分科釋經為二初釋經題二釋經文初中二初正釋題子科為二初總標疏釋此經題五重玄義準孤山法師以兩土果人為名方等實相為體信願淨業為宗捨苦得樂為用生酥大乘為教相鈔五重者名體宗力用教相也玄者幽微難見也義者深有所以也此天台智者大師深得佛心洞明經旨未釋經文先以經中幽微難見深有所以之旨以釋經題使人一覽經題即知經義蓋名者經之名也體者經名所詮衆生之心體也宗者行也全性體以起觀宗全觀行以歸心體之宗要也力用者經之體宗生善滅惡之大用也教相者明如來五時說法之進否也意使學者因名以尋心體因體以立宗要斷疑而生信生善而滅惡善知大小偏圓不致謬濫經旨也二別釋為五初釋名二初標初釋名二釋二初釋今題二初通別各釋二初釋別題二初約能說所說釋二初釋佛說二字二初二字合釋疏佛說者釋迦教主四辨宣演也鈔佛乃極聖之通號舉其別號乃娑婆世界釋迦教主也具云釋迦牟尼此云能仁寂默能仁是其用寂默是其體今智在于說乃其教用故略體從用號曰能仁謂能其仁而利益三界也四辨者一義無礙辨謂知一切諸法義理通達無滯二法無礙辨謂通達一切諸法名字分別無滯三辭無礙辨謂於諸法名字義理隨順一切衆生殊方異語為其演說能令各各得解辨說無滯四樂說無礙辨謂隨順一切衆生根性所樂聞法而為說之圓融無滯佛凡說法以此四無礙辨才而宣演之故曰佛說二二字各釋二初釋佛字疏梵語佛陀華言覺者十號之一究竟覺了諸法實相名圓滿覺鈔題稱為佛梵語猶略具云佛陀華言覺者此則屬人若單云佛華翻為覺此則屬法通號有十一如來二應供三正遍知四明行足五善逝六世間解七無上士八調御丈夫九天人師十佛十號具足為世間尊究竟覺了等者此指天台六即判佛中此當第六究竟即覺也六即者一理即覺二名字即覺三觀行即覺四相似即覺五分真即覺六究竟即覺六故凡聖不濫免生上慢即故初後不二免生退屈一理即覺者諸法實相一心圓具昏盲不減倒惑無虧故無機子頌云動靜理全是行藏事盡非冥冥隨物去杳杳不知歸名理即覺也二名字即覺者從善知識或修多羅聞三寶名知四諦字全體即是毫𩬊無差故無機子頌云方聽無生曲始聞不死歌今知全體是番悔自蹉跎名名字即覺也三觀行即覺者全三諦理起三觀修圓伏五住入五品位故無機子頌云念念照常理心心息妄塵遍觀諸法性無假亦無真名觀行即覺也四相似即覺者雖未成器粗垢先落見相似理獲六根淨故無機子頌云四住雖先脫六塵未盡空眼中猶有翳空裡見花紅名相似即覺也五分真即覺者分破無明分見佛性百界作佛八相成道故無機子頌云豁爾心開悟湛然一切通窮源猶未盡常見月朧名分真即覺也六究竟即覺者無明破盡三德功圓窮源到底稱無上土故無機子頌云從來真是妄今日妄皆真但復本來性更無一法新名究竟即覺也二釋說字二初詁訓釋疏說者悅也得機而說稱悅佛懷鈔四明云悅是暢悅懷是心懷若論此經即是如來久修久證念佛三昧蘊之在懷今機叩發說之乃暢昔之所懷二簡異釋疏又經通五人共說揀異菩薩天仙化人故言佛說鈔五人皆能說經若請佛印皆可流傳揀非四人故標佛說二釋阿彌陀二初翻梵疏阿彌陀此云無量壽鈔阿彌陀三字梵語此方翻為無量壽二釋義二初釋無量壽二初引經釋疏經云彼佛壽命及其人民無量無邊阿僧祇劫鈔彼佛壽命舉其化主及其人民舉其衆生也彼國淨土雖有其民而無其王以其人民各各調善自居不須文武兼治故無其王但有佛為化主法王而已大凡化主壽命隨其國土人民以為長短彼國人民尚然壽命無量況佛壽命而有量乎此則舉民顯主佛壽無量三況勝釋疏以應身無量而天人莫知其數況法報也鈔法報應三身各有壽量者夫壽依命立命藉身持經既言壽又有身命故天台大師觀經疏釋題無量壽明三身三命三壽云法身師軌法性還以法性為身此身非色質亦非心智非陰界之所攝持強指法性為法身耳法性壽者非報得命根亦無連持強指不遷不變名之為壽此壽非長壽亦非短壽無延無促強指法界同虗空量此即非身之身無壽之壽不量之量也報身者修行所感法華云久修業所得涅槃經云大般涅槃修道得故如如智照如如境菩提智慧與法性相應相冥相應者如函蓋相應相冥者如水乳相冥法身非身非不身智既相冥亦非身非不身強名此智為報身法壽非壽非不壽智既應冥亦非壽非不壽強名非壽為壽法量非量非無量智既應冥亦非量非無量強名無量為量也應身者應同萬物為壽也應同連持為壽也應同長短為壽也智與體冥能起大用如水銀和真金能塗諸色像功德和法身處處應現往能為身非身能為常壽為無常壽能為無量能為有量有量有二義一為無量之量二為有量之量如七百阿僧祇及八十等是有量之量如阿彌陀實有期限人天莫數是有量之無量應佛皆為兩量逐物隨緣參差長短然此三身三壽不可並別一異即乖法體即一而三即三而一乃會玄文今文乃以應壽而況顯法報以是之故而經題稱為無量壽也次釋無量光二初別翻疏亦云無量光二引經疏經云彼佛光明無量照十方國無所障礙鈔此亦無量壽佛應身之光以光而例壽應亦可論三身謂法身非身非不身則法光非光非不光等今是應身之光尚然無量照十方國無所障礙況法報光耶二約通號別號釋二初正釋疏又佛是通號阿彌陀是別號鈔諸佛皆有通別二號今此經題釋迦但舉其通彌陀但舉其別二釋疑疏釋迦是此方教主庶物咸知故舉通號彌陀是極樂導師理須表顯故彰別號鈔或有疑云諸佛既有通別二號經題何不兩土化主通別並舉應云釋迦佛說阿彌陀佛經故解中釋其疑云釋迦是此方教主衆生無不聞知故但舉通號以該其別彌陀是極樂導師不表其別名則不顯故彰別號以該其通譯人為省重繁存略雅得其所也二釋通題二初約法常釋疏經者法也常也十界同遵三世不易鈔法常之釋乃依觀經疏轉釋又依妙宗鈔謂儒經講解有茲二訓萬代軌則故訓法也百王不易故訓常也佛經亦然十界咸軌三世不易也二以由義釋疏由聖人金口所宣故言經也鈔妙宗鈔云由佛大聖金口宣吐自證之法故名為經二通別合釋二初指通別二名疏又經是通名佛說等是別名鈔妙宗云通名者頓說漸說施權開權律論之外皆名為經故稱通也別名者別相乃多今從三種謂人法譬單三復三并具足一以成七別單三者單人如阿彌陀經等單法如大般涅槃經等單譬如梵網經等復三者人法如文殊問般若經等法譬如妙法蓮華經等人譬如如來師子吼經等人法譬具足者如勝鬘師子吼一乘大方便方廣經等以此七別與通合標一代佛法二明通別所以五初通論一化疏經有三種謂教行理依教修行從行顯理鈔妙宗云今家釋題約通別論者以其二名各具教行理也若無此三徒論通別無所以矣何以故蓋依教而後修行從行而後顯理故也二別指今題疏佛是覺義約修成說故屬於行說即是教阿彌陀是理鈔今題佛字判屬于行者以佛是覺義有自覺覺他覺行圓滿之義也約修成邊說故屬于行說字屬教最分明阿彌陀判屬於理者以是本性彌陀故正當行者稱念修行斯得見故故判屬于理三判其通別疏與衆典不同則三經皆別以對經字則三經皆通鈔與衆典不同則不惟五字成別即教行理三經皆別以對經字則不惟一字成通即教行理三經皆通也四結成祕藏疏理即法身行即般若教即解脫三一圓融不可思議名祕密藏鈔今家凡是經題皆約通別釋者正欲明各各具三經也各具三經者又正欲明具祕密藏也如一題阿彌陀三字即我行者法身本性也佛之一字即全性起修之般若智慧也說之一字即智與法身所得之解脫也又理即全苦道即法身正因佛性也行即全惑道即般若了因佛性也教即業道即解脫緣因佛性也如是三德如世伊三點天王三目不縱不橫不並不別乃不可思議祕密之藏經題義理微妙若此講者聽者安可忽諸五結成功德疏故聞題名字獲無量功德也鈔如金光明及諸大乘多作此說二出本名疏此經本名稱讚不可思議功德一切諸佛所護念經三辨譯異三初總標疏傳至中華凡二譯二別明二初唐譯疏唐譯云稱讚淨土佛攝受經二秦譯二初與唐辨異疏今秦本隱略經題在六方佛後即云汝等衆生當信是等鈔唐譯則存本名而秦譯不存者以其隱略在六方佛後故也二讚秦譯善巧疏以此經正示持名方法況彌陀聖號衆所樂聞用此立題人多信受故得四海同遵流通無盡譯人之善巧也鈔大凡立名貴生物善今所生善則有二種一以此經正示持名方法一以彌陀聖號衆所樂聞故用此立題人多信受是以唐譯者祕于大藏而不見不聞秦譯者四海同遵而流通無盡譯人善巧信而有徵矣二辨體二初標疏二辨體鈔二辨體者即前總列中云方等實相為體也方等實相有二義一此經說在第三方等時方等四教並談此經屬圓揀異此經實相非華嚴般若法華三時之實相故云方等一圓教實相門門可入清涼池故方生佛均有平等不二故等觀經疏云體是主質妙宗鈔云名傍是賓體正是主名是假名體是實質一切名下皆有其質今辨假名下之實質也二釋二初引論明體疏智度論云諸大乘經通以一實相為經正體鈔妙宗鈔云諸法不生不滅非有非無無能無所離言說相離名字相離心緣相離此等相名為實相無相之相也若以彼義會歸此經則前段七重欄楯去至聞是音者皆生念佛念法念僧之心是明惟心淨土序云瓊林玉沼直顯於心源是也中段彼佛何故號阿彌陀去至但可以無量無邊阿僧祗說是明本性彌陀序云壽量光明全彰於自性是也瓊林玉沼是明依報該得四種淨土壽量光明等是明正報該得佛菩薩九品往生之人此正法華惟佛與佛乃能究盡諸法實相天台所謂性具三千無非實相之體也二結成所詮疏即所詮之理也三明宗二初標疏三明宗二釋二初引經證成疏經云若有信者應當發願生彼國土鈔前總列中云信願淨業為宗故今引經證成若有信者即信門也應當發願即願門也若欲證成淨業行門應具引下文七日持名一心不亂求生淨土此為三要之門信則信有惟心淨土本性彌陀如來願力皆得往生此當十乘中第一觀不思議境也雖有其信若無其願則不得生蓋彌陀既以願力而攝生我當誓願而求往方得天性相關任運與拔猶如磁石自然吸取十乘往判此當第二真正發菩提心也四弘中當佛道無上誓願成該得前之三願雖有其願若無行門其願則狂故須七日持名一心不亂十乘往收此當第三善巧安心止觀也七日持名即是觀一心不亂即是止方持名而一心方一心而持名是則止觀雙照亦復雙遮善巧安心方得成就略標上根三法其餘七乘皆在中矣二結成宗要疏一經之宗要也四明用二初牒疏四論用二釋二初引經證成疏經云即得往生極樂國土皆不退轉於無上菩提鈔初二句即示以七日持名一心不亂後之文次二句即此前經云衆生生者皆是阿跋致之文前總列中云捨苦得樂為用即經云即得往生云云之文若以後足前則衆生生者皆娑婆念佛之人必得不退菩提以此二文合證此經之力用也二結成力用疏離生死苦得解脫樂此經之力用也鈔餘之法門莫不皆令衆生竪出三界離生死苦得解脫樂如重臺九級自下升高力勝則進足疲則墮其登也難惟淨土法門令衆生橫出三界離生死苦得解脫樂家庭咫尺從東至西舉目可觀彈指即到其去也易經之力用豈不大乎五判教相二初總標五判教相鈔教者聖人被下之言相者分別異同如來五時設教適時而進大小漸頓各有區分天台約五時而分別之各有攸存故凡釋經皆須判教二釋相疏部屬大乘方等教攝二藏明義菩薩藏收漸頓分之此屬頓教鈔判此教相而有三說部屬大乘方等教攝者第一約時判也前總列云大乘生酥為教相生酥即方等時也天台大師用涅槃五時生起次第以判如來一代之教初從牛出乳譬從佛最初三七日說華嚴經次從乳出酪譬從十二部出九部修多羅十二年中說小乘四阿含經次從酪出生酥譬從阿含出方等八年之中說維摩大集楞嚴楞伽十六觀并此經等彈偏斥小歎大褒圓聲聞之人得彈訶益恥小慕大出入無難如小乘偏空出三界外無身無土今則特告身子而云彌陀有土菩薩有身衆生生者皆不退轉即其事也次從生酥出熟酥譬從方等出般若二十二年說大品般若等諸經以空慧水洮汰二乘執情令須菩提等轉教般若付財融通次從熟酥出醍醐譬從般若出法華涅槃九界三乘會權授記無小無大皆令作佛今是第三生酥故曰部屬大乘方等教攝二藏明義菩薩藏收者第二約藏判也蓋佛所說經有聲聞藏即為諸二乘人說者明理但至真諦明惑但破見思明智但修空觀明果無身無土今經既明出娑婆外別有淨土則果報有乎身土豈不理惑智果皆屬菩薩藏收漸頓分之此屬頓教者第三約教判也化儀之教有漸有頓漸則經劫修行方階不退頓則即生成辦位至阿故結成云以令凡夫不退菩提然而令其即生位階不退固是圓頓法門亦必須先開圓解而次修圓行破三惑而方證圓果以階不退今則但說彼土依正二報以之為開解生信七日持名一心不亂以之為造修行門臨命終時即得往生以階跋致自非釋迦之善權彌陀之願力行者之宿根現前之三要一心不亂而三惑圓伏頓斬業根而直往無前安能克此故知此經為五濁惡世之無上醍醐涅槃經云置毒生酥中食即殺人可不信諸二譯人二初標科二譯人號姚秦三藏法師鳩摩羅什奉詔譯二解義二初明其生處疏鳩摩羅什此云童壽丘慈國人也二明其翻譯疏後秦姚氏據長安尊為國師弘始年間譯諸經論鈔姚秦者簡非亡秦前秦乞伏秦今是後秦姚氏也以弘始三年方入長安秦主敕僧等八百沙門資受什旨於草堂寺所譯經論凡九十八部合四百二十一卷僧睿僧肇道常等筆受三證其功德疏南山感通傳云七佛以來譯經師鈔過去七佛皆生於西天竺迦維羅衛國滅度之後或正法或像法時西天梵策必傳流震旦譯梵成華譯經之師歷代皆有惟什師自七佛以來常為我震旦譯經之師此乃南山律師問費氏天人所說又有云什師位證三賢是知非聊爾人也二釋經文二初總別科判二依科解釋今初二初總科三分二釋經文三從初至大衆俱為序分從爾時佛告至六方後徵釋經題為正宗分從汝等皆當信受我語盡文為流通分鈔漢明以來經至震旦弘法之師隨文講解無有科判至晉道安法師方判大小諸經皆有三分謂序正流通後西天親光論至與其三分義同又此方出家之士自漢以來皆隨師姓如三支之類後道安法師謂既捨俗姓以從釋迦宜合一切俱從釋姓後增一阿含至世尊果云萬流入海同一鹹味四姓出家同稱釋氏故後人讚道安法師云分經雅合於親光釋姓頗同於增一二別明二序疏諸經皆有通別二序此經但有通序證信而無別序發起即十二部經中無問自說也鈔通別二序者通者同也如是等六事諸經皆同故別者異也諸經發起之緣各各不同故今經但有通序而無別序者乃如來無問自說蓋淨土法門若被菩薩之機正所當對必須假問而說如十六觀經是其類也但此一經是對上乘及凡夫機令知微妙身土即生可獲原非小乘凡夫境界豈能問之故如來無問自說稱性宣揚何須發起二依科解釋二初釋通序二初分科通序分二初五句證信鈔證信者佛將滅度阿難咨問一切經首當安何語佛答云當安如是我聞等豈惟我然三世諸佛經初皆爾二釋經二初列經如是我聞一時佛在舍衛國祇樹給孤獨園二釋義五初釋所指法體疏如是者指所聞之法體也實相之理古今不異名如如理而說為是鈔如是者指法之辭所指者即所聞法體實相之理如此之理古今不異名如即真如不動之體亘萬古而恆新歷千差而不改如來能稱此理而說無不當理故稱如是二釋所顯能聞疏我者阿難結集法藏自言如是法門我從佛聞鈔佛地論云謂結集時共請言如汝所聞當如是說傳法菩薩便許可言如是當說如我所聞三釋所明機感疏一時者機應和合之時也不言某年月日者二土正朔不同故也鈔機即阿難與千二百人并菩薩等衆應即釋迦如來能說教主機無應而不成應無機而不就砧椎相叩乃方成法器機應合一則此經方說二土正朔不同者如此土四時彼方三際東夏以合朔為月旦西方以既望為月旦兩方既爾四夷可知既難準定故但言一時四釋所稱化主疏佛者覺也自覺異凡夫之不覺覺他異二乘之獨覺覺滿異菩薩之在因衆聖中尊故名曰佛即釋迦教主也鈔梵語佛陀此云覺者謂覺了性相真妄之者即究竟本覺亦究竟始覺自覺異凡夫之不覺者凡夫則終朝昏擾逐妄漂流如來則寂照雙融還源返本覺他異二乘之獨覺者二乘則覺了生死如麞獨跳如來則自登彼岸慈航度人覺滿異菩薩之在因者菩薩則三覺雖修而三因未滿如來則三覺究竟而三德圓彰為二乘菩薩衆聖中尊故稱為佛以通從別即娑婆教主釋迦牟尼佛也五釋所述住處二初釋舍衛國疏舍衛正云室羅筏悉底此云聞物言人物富庶遠聞諸國故鈔人物富庶者謂此國具足欲塵財寶之物多聞解脫之人也二釋祇樹給孤獨園二初出二人名德二初祇陀疏梵語祇陀此云戰勝波斯匿王太子名也鈔波斯匿王太子初生之時適與外國戰勝因立美名二須達疏梵語須達此云善施長者名也能惠施國之窮民名給孤獨二明二人並稱疏側布黃金從祇陀買園建立精舍請佛說法祇陀施樹故並稱也鈔須達長者為兒聘婦往王舍城得見如來請佛供養佛命身子同往相地惟祇陀太子園林茂盛可造精舍祇陀戲許須金磚側布其地金錢掛滿其林便當與之須達歡喜命車載金布地將滿祇陀見其精誠便云地當屬卿林屬於我共施供佛不亦可乎故後凡於此地說經經家序處必美二人之德而並稱之列衆同聞二初分科二列衆同聞三初聲聞衆二初示數二釋經三初聲聞二示數二初列經與大比丘僧千二百五十人俱皆是大阿羅漢衆所知識二解義為四初釋明類疏比丘此云乞士乞食資身乞法鍊心又云怖魔又云破惡僧者具云僧伽此云和合衆鈔比丘梵語而含三義一乞士外為檀越乞食以資色身永離四邪內為如來乞法以鍊心性常趣八正應供之因也二破惡能破九十八種煩惱惡因能破二十五有生死惡果殺賊之因也三怖魔發心出家魔王怖其出境精進修行波旬怖其離欲無生之因也衆和合者凡為僧者須具六和一戒和同修二見和同解三身和同住四利和同均五口和無諍六意和同悅具此六和方可稱僧二釋示數疏三迦葉有千弟子舍利目連共二百五十人最初歸佛常隨衆也鈔三迦葉者一優樓頻螺迦葉二伽耶迦葉三那提迦葉若最初度憍陳如五人合云千二百五十五人經舉大數是故略之得餐甘露莫先於此故為常隨衆也三釋顯位疏阿羅漢含三義一應供為人天福田乞士果也二殺賊斷煩惱盡破惡果也三無生不受後有怖魔果也鈔比丘因名也阿羅漢果號也因果二名一一主對如影隨形略無差忒故為比丘有乞士之因方獲羅漢應供福田之果有破惡之因方獲斷煩惱盡殺賊之果有怖魔之因方獲無生不受後有之果四釋歎德疏聞名欽德曰知覩形敬奉曰識鈔若但聞名而未覩形則知而未識但覩形而不聞名則識而未知今既聞名而覩形必欽德而敬奉阿難尊者與此輩等同聞非惟見同列之德齊亦乃顯所聞之法真以之證信誠可信也二列名二初牒科二列名二釋經二初列經長老舍利弗摩訶目犍連摩訶迦葉摩訶迦旃延摩訶拘絺羅離婆多周利槃陀伽難陀阿難陀羅睺羅憍梵波提賓頭盧頗羅墮迦留陀夷摩訶劫賓那薄拘羅阿㝹樓䭾二釋義二初釋長老疏耆年碩德通稱長老鈔此諸聖僧有耆年者必有碩德有碩德者未必定是耆年故長老者乃耆年與碩德之通稱也二釋衆名十六初釋舍利弗疏舍利弗此云身子其母身容端正眼如鶖鷺兼母名之故又名鶖子智慧第一二釋目犍連疏摩訶目犍連此云大采菽姓也其族衆多故以大別之神通第一三釋大迦葉疏摩訶迦葉此云大龜氏其祖感靈龜負仙圖而出遂以名族又云飲光身光赫奕映蔽餘光毗婆尸佛時為治金師貧女以金珠同修塔像從是以來身光金色四釋摩訶迦旃延疏摩訶迦旃延此云文飾論議第一五釋摩訶拘絺羅疏摩訶拘絺羅此云大膝從狀得名舍利弗母舅六釋離婆多疏離婆多此云星宿父母禱星而生遂以為名七釋周利槃陀伽疏周利槃陀伽此云繼道其母省親生於路傍故姿性魯鈍惟誦半偈證羅漢果八釋難陀疏難陀此云善歡喜佛之親弟也九釋阿難陀疏阿難陀此云慶喜白飯王之子佛之堂弟也佛成道日生舉國欣慶因立嘉名多聞第一十釋羅睺羅疏羅羅此云覆障本修羅之名能障日月佛為所障不即出家故以為名十一釋憍梵波提疏憍梵波提此云牛呞宿生為牛食已轉哨故受此名十二釋賓頭盧頗羅墮疏賓頭盧此云不動名也頗羅墮此云利根姓也別譯云賓度羅跋囉墮闍十三釋迦留陀夷疏迦留陀夷此云黑光其形粗黑故十四釋劫賓那疏摩訶劫賓那此云房宿母禱房星而生十五釋薄拘羅疏薄拘羅此云善容形貌端正昔施僧一訶梨勒感五不死報十六釋阿㝹樓䭾疏阿㝹樓䭾此云無貧昔於饑世以稗飯施辟支佛九十一劫果報充足天眼第一鈔諸經列衆皆有歎德如法華楞嚴是其例也惟此經無之非無也蓋譯人善巧令顧名而思義也如大智舍利弗摩訶目犍連等顧何德而不彰然諸經嘆德必隨緣起如阿難以邪染之緣浚發楞嚴而經家嘆德特曰佛子住持善起諸有云云同列之衆既有是德正顯當機雖托緣于邪染而實無是過也此經餘諸弟子且無暇論即大智舍利弗位居其首次之以大目犍連摩訶迦葉摩訶迦旃延三人者豈無意乎蓋極樂法門微菩薩實智而莫能信微菩薩大神通而莫能往微抖擻三惑而莫能淨微四無礙辨而莫能論此經說在方等意令聲聞回小智以成大智回小通以成大通回小頭陀以成大頭陀回小議論以成大議論淨土即權而實即實而權者斯可以照了實相信受奉行即近而遠即遠而近者斯可以不速而疾彈指即到心淨土淨即穢而淨者斯可以生即無生生化兩冥妙有即空真空即有者斯可以妙用辨才剖析無礙至於餘諸弟子各有一德以類而歎德即事而回向於此法門成方等益了無生而生感界外生達無身而身受變易身竪出三界固不可思議又有橫出三界尤不可思議也二總結二初牒科三總結二釋經二初列經如是等諸大弟子二解義疏學在師後故稱弟解從師生故稱子此總結前文也鈔弟則顯師之謙讓師乃明資之尊敬故夫子曰余也處回如弟回也處余若父二菩薩衆二初分科二菩薩衆三初明類二釋經二初列經并諸菩薩摩訶薩二釋義疏梵語菩提薩埵此云覺有情同佛所證曰覺無明未盡曰有情摩訶薩此云大道心衆生鈔菩薩二字梵語存略若具足稱之應云摩訶菩提質帝薩埵摩訶翻大菩提翻道質帝翻心薩埵翻衆生亦翻有情合為大道心衆生大道心則下異衆生有情則上異諸佛蓋已離此岸尚居中流此諸菩薩乃又居其大者故以摩訶薩別之二別名二初牒科二列名二釋經二初列經文殊師利法王子阿逸多菩薩乾陀訶提菩薩常精進菩薩與如是等諸大菩薩二解義為五初釋文殊疏文殊師利此云妙德以微妙三德同佛所證故亦云妙吉祥菩薩入法正位名法王子鈔微妙三德同佛所證者圓教始從初住終至等覺分破一品無明分同佛證微妙三德若約文殊菩薩則有本迹之殊本因如悲華經對寶藏佛發弘誓願蒙佛授記字曰文殊又于燈明佛所為八王子之師是釋迦九代之祖昔太鄰諸佛今輔佐釋迦若論本果現在北方歡喜世界作佛號歡喜藏摩尼寶積佛未來在南方離垢世界成佛號普現如來本迹如此同佛所證厥位相齊亦名妙吉祥者惑業苦三有少分在皆未吉祥位居究竟三德圓彰故又號妙吉祥也佛破二十五有獲王三昧入法正位名破有法王文殊亦位鄰等覺為佛長子名法王子也次釋阿逸多疏阿逸多此云無勝超出偏小故慈氏之名也鈔梵語阿逸多翻為無能勝名也又名彌勒翻為慈氏姓也思益經云若衆生見者即得慈心三昧合而言之是則此菩薩以地位證入鄰極慈心及物以受姓名也三釋乾陀訶提疏乾陀訶提此云不休息勤修不懈故鈔思益經云恆河沙劫為一日夜是三十日為一月十二月為一歲過百千萬億劫得值一佛如是值恆河沙佛行諸梵行修習功德然後授記心不休息故號為乾陀訶提四釋常精進疏常精進者乃法性常住成無作正勤故鈔寶積經云是菩薩為一切衆生經無量劫隨逐不捨猶不受化無一念棄捨以身心俱進名常精進祇以見法性常住成無作正勤雖精進而無精進相也五釋總結疏大菩薩者迥出偏小故鈔靈芝云菩薩名通初後如是菩薩莫非深位補處或權現影響故稱大也諸經列菩薩衆亦有歎德如法華等是其通例惟此經無之非無也亦令讀是經者顧名而思義仰德而受行也何也如文殊以妙德吉祥阿逸多以無能勝慈氏乾陀訶提以自強不息勤修無懈常精進以悟法常住成無作正勤顧何德而不具經家獨列此四人者意令修行淨土者先以微妙三德即吾心之三諦為能觀三觀之本即所謂先觀不思議境是也繼之以無能勝之無緣慈悲而真正發菩提心以表今之求生極樂者一以化衆生斷煩惱學法門成佛道而為初志然後加之以全性起修自強不息勤修無懈了法性常住成無作正勤庶捨穢能盡取淨窮源即娑婆之塞以臻乎極樂之通則道品自然調適對治法爾助開九品可階疑城不住法愛不生金臺可升得預如是等諸大菩薩之列矣經家之意其在是乎三人天衆二初牒科三人天衆二釋經二初列經及釋提桓因等無量諸天大衆俱二釋義三初釋提桓因疏釋提桓因此云能天帝忉利天主也鈔梵語具云釋提桓因陀羅此翻能作天帝忉利天主也忉利此翻三十三須彌山頂四面共八城每城居四天天帝居善見城中合三十三因果莊嚴具俱舍頌說次釋無量諸天疏無量諸天者欲色界中諸梵天王護世四王等也鈔欲界有六天地居二天即下四王天并第二忉利天空居四天即夜摩兜率化樂他化也色界四天初禪二禪三禪各三天四禪九天佛凡說經皆來會集惟無色界天既無色質故不云來三釋大衆疏兼四衆八部故言大衆俱鈔四衆者比丘比丘尼優婆塞優婆夷也八部者天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩呼羅伽人非人等也次釋正宗二初總判三科二正宗分三初依正莊嚴二修證行法三諸佛稱讚二依經釋義二初分科就初為二初總示二別釋初又二初依報莊嚴二釋經為二初依正莊嚴二初總示二初依報莊嚴二初列經爾時佛告長老舍利弗從是西方過十萬億佛土有世界名曰極樂二解義六初釋爾時疏爾時者將說經之時也鈔爾時即前通序機應合一之時惟其合一故將說經二釋當機疏以身子利根故特告之不俟其請問也鈔淨覺云不告菩薩天龍者應有四悉意一是左面弟子大小法集多居其首故二由智慧第一四衆八部罔不欽仰故三為令四衆聞佛淨土自鄙絶分故四復欲小乘未取證者回心向大故佛凡說法必獲四悉檀益今謂於佛說十二部經中此當無問自說以淨土法門非小乘境界故復欲令彼回小向大故此經唯無祗夜伽陀因緣譬喻優波提舍而長行直說方廣受記未曾有此皆顯有若未本生本事則以略望廣於大彌陀經亦復具有三釋界數疏一大千世界稱一佛土十疑論云西方去此十萬億剎為對凡夫肉眼生死心量而言之耳但使衆生淨業成就臨終在定之心即是淨土受生之心動念即是生淨土時實非遠也鈔解中先依經明遠次約理明不遠一大千世界稱一佛土者百億日月百億須彌百億四大海百億鐵圍山名一佛土故俱舍頌云四大洲日月須盧六欲天梵世各一千名一小千世此小千千倍說名為中千此千倍大千皆同一成壞是也如此觀之極樂世界去此甚遠次引天台大師十疑論明不遠蓋言凡夫之人以先世煩惱惑善惡業報得此生五陰苦果所有凡夫肉眼遠即不見乃以不見者為遠所有生死心量遠則不知亦以不知者為遠無怪其然若念佛之人一心不亂則惑道伏淨業成就則業道清臨終之時娑婆印壞則苦道脫當爾之時化肉眼為天眼變凡心為聖心故臨終在定之心即是淨土受生之心動念即是生淨土時言動念者乃垂終得見三寶與夫見光見華等一有所見便名動念非妄念之念也雖在此土得見已是華池受生之時故曰實非遠也又般舟經明衆生有三力故得見彌陀一者三昧力即論中所明是也二者佛力四十八願經云設我成佛十方衆生至心信樂欲生我國乃至十念若不生者不取正覺三者本功德力此有二義一者衆生自無始來曾有念佛求生淨土種子當時未生今種已熟應得往生二者衆生心性本具塵剎雖十萬億之遙無非性具即性體性量如帝網之一珠影含衆珠如大海之一浪具全潮體非但互具亦乃互即故四明云若心性不具塵剎則生無感見之功佛無應現之理也四釋極樂疏梵語須摩提此云安養或云清泰又云極樂者猶言最勝也鈔安養者對娑婆八苦交煎所養者非安也清泰者對娑婆五濁惡世所處者非泰也極樂者對娑婆衆苦之劇所受者非樂也五出四土二初總標疏一切國土隨機所感有乎四種二別釋四初寂光土疏一常寂光土諸佛究竟極果所居鈔觀經疏云常寂光者常即法身寂即解脫光即般若是三點伊不縱不橫名祕密藏妙宗鈔云前三在事故從居人修斷因果而立土名此土屬理故從本體三德為名私謂鈔中既有上品寂光之名則知彼土亦分九品惟上上品為極果所居餘之八品皆圓聖分證人所居為分證寂光也疏云分證究竟寂光淨穢是也二實報土疏二實報土法身大士所居鈔觀經疏云實報無障礙者行真實法感得勝報色心不相妨故言無障礙純菩薩無有二乘仁王經云三賢十聖住果報即是其義釋論云菩薩勝妙五欲能令迦葉起舞華嚴云無量香雲臺即其土淨妙五塵私謂諸佛亦有報土何必定為菩薩所居亦可準分九品上上品為佛所居餘之八品隨菩薩所破無明多少以為差降爾疏云次第頓入實報淨穢是也三方便土疏三方便土三乘人所居鈔觀經疏云方便有餘者修方便道斷四住惑故曰方便無明未盡故曰有餘釋論云出三界外有淨土聲聞辟支佛出生其中受法性身非分段生法華云若我滅度後實得阿羅漢若不信此法若遇餘佛便得決了就中復有利鈍指上為淨指下為穢也私謂既曰就中復有利鈍淨穢是則準望亦分九品圓方便道居上三品別通方便道居中三品藏方便道居下三品疏云體析巧拙有餘淨穢是也四同居土二初出名疏四同居土六凡所居鈔觀經疏云娑婆雜惡荊棘瓦礫不淨充滿同居穢也池流八德樹列七珍次於泥洹皆正定聚凡聖同居上品淨土次釋義疏以五濁輕重而分淨穢娑婆五濁重故兼四惡趣輪回不息安養五濁輕故惟有人天皆得不退故名極樂鈔以五濁下標娑婆下釋一往言之娑婆衆生以五濁之因重故名同居穢是故感報兼四惡趣此由煩惱濁中五鈍使隨其強者而牽生四趣人天既由戒善故煩惱稍輕安養五濁輕者由在娑婆專修淨業輕于五濁故得往生極樂受人天報況至彼塵境輕清不生煩惱故雖人天皆得不退故名極樂再往言之極樂國土亦分淨穢如觀經九品大本三輩品位既分高下所見亦自不同故妙宗鈔云初五濁輕為同居淨者此淨甚通須知別意如戒善者四教凡位皆悉能令五濁輕薄感同居淨而圓觀輕濁感同居淨依正最淨如經中說地觀已去一一相狀比于餘經修衆善行感安養土其相天殊六簡別疏盡理言之惟究竟寂光是真極樂鈔盡理言之等者此約四土展轉簡之是則分證寂光猶如穢土苦域惟究竟果人所居之土方得名為真實極樂故前序先明真源不二云寂光真淨初無苦樂之殊此之謂也二正報莊嚴二初牒科次正報莊嚴二釋經二初列經其土有佛號阿彌陀今現在說法二釋義二初釋三身二初總標疏佛有三身二別釋二初法身疏一法性身居寂光土身土一如名祕密藏鈔觀經疏云法身者師軌法性還以法性為身此身非色質亦非心智非陰界入之所攝持強指法性為法身耳妙宗鈔云師軌釋法捨通從別通則生佛俱軌法性然其九界雖軌而違如人依師不順師教唯有諸佛從初發心軌法而修今能究竟冥合法性故大經云諸佛所師所謂法也以法常故諸佛亦常順法性故名法為師實非所師與能體別故即所師法而為其身雖名為身已出五陰故非色質及非心智色是初陰心智即四陰既其非陰亦非入界故非三科任持攝屬此則已簡分段變易以示生死陰等攝故亦可色質簡應心智簡報三科簡因既非此等何以狀名為物機故強指法性名為法身此能居之身也所居之土正如前釋二報身疏二者報身居實報土鈔觀經疏云報身者修行所感法華云久修業所得涅槃云大般涅槃修道得故如如智照如如境菩提智慧與法性相應相冥相應者如函蓋相應相冥者如水乳相冥法身非身非不身智既應冥亦非身非不身強名此智為報身妙宗鈔云報即酬報也修行是因感于妙報而酬因也法華證智德經云慧光照無量久修業所得大般涅槃證斷德也此二果德酬答修因是故名報感報之時其相何似故以一法二喻顯之如名不異所觀差別不名如境智外有境不名如智各二如者境如如智智如如境此之境智故得應冥智慧名通故以果覺菩提簡之即是無上菩提之智與法性境相應相冥先舉函蓋喻其相應恐謂函蓋雖際畔相當終存兩相故重舉水乳以喻相冥令知始本同是覺性其體泯然正同水乳則顯境外無智智外無境水乳可見言非身者非應佛有分齊身非不身者非報佛無分齊身又非身則非有非不身則非空中道法身乃本覺體始覺冥此能冥亦忘為成現故強名報智土義同前三應化身疏三應化身居不二土隨九品機所見不同鈔觀經疏云應身者應同萬物為身也智與體冥能起大用如水銀和真金能塗諸色像功德和法身處處應現往能為身非身然此三身不可並別一異即乖法體即一而三即三而一乃會玄文妙宗鈔云如谷答響大小隨聲如鑑現形端醜在質應萬物感現勝劣身智即報身體即法身此二冥合應用無方真金上色須水銀和方能塗物闕此一緣金無塗用報智功德契會法身隨有機處應無不往上所說報但論冥法即自受用也今明垂應以他受用常住之應對于生身無常之應示二迹用是故雙明身等身即生身有分齊相故名為身非身是報無分齊相故曰非身小般若云佛說非身是名大身大身者乃他受用身也他身者一時隨機變化而有義則同於應身體用少有差別應身則從法報冥合之體以起應用化身則從應身之體以起化用乃從用而為用也更或從化而化則化化無窮應身則八相始終化身則倏起倏滅居不二土者報身為能證之智法身為所證之理是則寂光實報皆能應之體他受用土及方便同居皆應身所居之土機緣差別有乎九品故視之為異佛應無差則寂光實報橫在三品故云不二應準觀經疏判九品往生人須者往檢又四土土土各分九品隨土感見三身有異隨機感見四土不同次釋簡異疏現在說法揀非過未也鈔下經云阿彌陀佛成佛已來於今十劫則知彌陀現在成佛而為衆生說法非過去未來之諸佛也二別釋二初分科二別釋二初依報二初總明極樂二釋經二初依報二初總明極樂二初列經舍利弗彼土何故名為極樂其國衆生無有衆苦但受諸樂故名極樂二釋義疏彼土下徵起其國下總釋無有衆苦者無三途八難等諸苦也對娑婆極苦言之故云極樂鈔娑婆世界具乎六道人天修羅名三善道以戒善為因地獄餓鬼畜生名三惡道以惡逆為因道即能通之義謂一切衆生造作善業能通人天等處造作惡業能通地獄等處故也又謂之三途者乃約果為名即由惡業而通至於火途刀途血途也一地獄道謂此處在地之下并鐵圍山間有八寒八熱等獄即造作極重惡業衆生墮于此道故名地獄道二餓鬼道有三種一謂罪業極重者積劫不聞漿水之名其次者但伺求人間蕩滌膿血糞穢又其次者時或一飽加以刀杖驅逼填河塞海即造惡業衆生由慳貪故生於此道三畜生道謂披毛戴角鱗甲羽毛四足多足有足無足水陸空行等即造作惡業衆生由愚癡故生於此道八難者八處皆障難也此之八處雖感報苦樂有異而皆不得見佛不聞正法故總稱為難一地獄難義釋同前地獄之中長夜冥冥受苦無間障於見佛聞法是故名難二畜生難義釋同前畜生道中受苦無窮障於見佛聞法是故名難三餓鬼難義釋同前餓鬼道中受苦無量障於見佛聞法是故名難四長壽天難謂此天以五百劫為壽即色界第四禪中無想天也言無想者以其心識不行如冰魚蟄蟲外道修行多生其處障於見佛聞法是故名難五北單越難梵語單越華言勝處謂此處感報勝東西南三洲也其人壽一千歲命無中夭為著樂故不受教化是以聖人不出其中不得見佛聞法故名為難六盲聾瘖啞難謂此等人雖生中國而業障深重盲聾瘖啞諸根不具值佛出世而不能見佛雖說大法亦不能聞故名為難七世智辨聰難謂世間之人邪智聰利者惟務耽習外道經書不信出世正法故名為難八生在佛前佛後難謂佛出現於世為大導師令諸衆生離生死苦得涅槃樂人有緣者乃得值遇其生在佛前佛後者由業重緣薄既不見佛亦不聞法故名生在佛前佛後難等諸苦者即人間八苦也一生苦有五種一者受胎謂識托母胎之時在母腹中窄隘不淨二者種子謂識托父母遺體其識種子隨母氣息出入不得自在三者增長謂在母腹中經十月日內熱煎煮身形漸成住在生藏之下熟藏之上間夾如獄四者出胎謂初生下有冷風熱風吹身及衣服等觸體肌膚柔嫩如被物刺五者種類謂人品有富貴貧賤相貌有殘缺妍醜是名生苦二老苦有二種一者增長謂從少至壯從壯至衰氣力羸少動止不寧二者滅壞謂盛去衰來精神耗減其命日促漸至朽壞是名老苦三病苦有二種一者身病謂四大不調衆病交攻若地大不調舉身沉重水大不調舉身胖腫火大不調舉身蒸熱風大不調舉身倔強二者心病謂心懷苦惱憂切悲哀是名病苦四死苦有二種一者病死謂因疾病壽盡而死二者外緣謂或遇惡緣或遭水火等難而死是名死苦五愛別離苦謂常所親愛之人乖違離散不得共處是名愛別離苦六怨憎會苦謂常所怨讐憎惡之人本求遠離而反集聚是名恐憎會苦七求不得苦謂世間一切事物心所愛樂者求之而不能得是名求不得苦八五陰熾盛苦五陰者色受想行識也陰即覆蓋之義謂能蓋覆真性不令顯發也盛即盛大之義謂前生老病死等衆苦聚集故名五陰熾盛苦對娑婆極苦言之故名極樂者蓋極樂衆生無有如上娑婆種種極苦之事故名極樂若敵顯者極樂衆生六根所對塵境無非微妙色聲香味觸莫不生人觀解信念三寶故無三毒之因不造惡逆之業故無三途之苦果無三道之障難也聞法入定不墮無想故無長壽天難也雖受極樂常受教化故無北俱盧洲難也六根清淨明利黠慧故無盲聾瘖啞難也衆生生者皆正定聚故無世智辨聰難也阿彌陀佛今現在說法經無量劫觀音即補其處號普光功德山王佛故無佛前佛後難也蓮苞托質無生苦也寒暑不遷無老苦也身非分段無病苦也壽命無量無死苦也無父母妻子無愛別離苦也諸上善人聚會無怨憎會苦也天花香食自然受用無求不得苦也觀照陰空無蘊苦也二別二莊嚴二初分科二別示莊嚴五初欄網行樹二釋經二初欄楯行樹二初列經又舍利弗極樂國土七重欄楯七重羅網七重行樹皆是四寶周匝圍繞是故彼國名為極樂二解義四初釋欄楯疏欄檻也橫曰欄縱曰楯莊嚴寶樹圍繞華叢也次釋羅網疏羅網者寶網羅覆光色晃曜周匝垂布莊嚴校飾也三釋行樹疏行樹者觀經云一一樹高八千由旬七寶華葉無不具足四釋四寶疏四寶者金銀琉璃玻璃也鈔大略言之極樂寶地之上一一珍寶樓閣之外莫不列以寶樹寶樹之外繞以欄楯寶樹欄楯之上又覆以羅網各以七重為率者所以表菩提分也然若樹若欄若網皆以四寶者所以表七覺不離四諦也娑婆世界王臣之家非無此嚴然以樹言之不過藂林以欄言之不過木石以網言之不過絲麻以地言之不過土石以因言之不過人力諸天雖復同之非若淨土之演法音淨土穢土之不同自然造作之各異豈無其故哉解引觀經一一樹高八千由旬七寶華葉無不具足以類明之則所莊嚴不啻四寶又可知也今當具引大本及以觀經一一具列非曰好繁亦所以助長求生淨土者之信樂耳觀經云觀寶樹者一一觀之作七寶行樹想一一樹高八千由旬其諸寶樹七寶華葉無不具足一一華葉作異寶色琉璃色中出金色光玻璃色中出紅色光瑪瑙色中出硨磲光硨磲色中出緑真珠光珊瑚琥珀一切衆寶以為映飾妙真珠網彌覆樹上一一樹上有七重網一一網間有五百億妙華宮殿如梵王宮諸天童子自然在中一一童子五百億釋迦毗楞伽摩尼以為瓔珞其摩尼光照百由旬猶如和合百億日月不可具名衆寶間錯色中上者此諸寶樹行行相當葉葉相次於衆葉間生諸妙華華上自然有七寶果一一樹葉縱廣正等二十五由旬其葉千色有百種畫如天瓔珞有衆妙華作閻浮檀金色如旋火輪宛轉葉間涌生諸果如帝釋瓶有大光明化成幢幡無論寶蓋是寶蓋中映現三千大千世界一切佛事十方佛國亦於中現又大本云復有七種寶樹其純一寶樹者根莖枝葉華果皆以一寶二寶為一樹者根莖枝葉花果間以二寶三寶為一樹者根莖枝葉花果間以三寶四寶為一樹者根莖枝葉各以一寶其花與果同於根莖五寶為一樹者根莖枝葉花各以一寶果則同於其根六寶為一樹者根莖枝葉華果各以一寶七寶為一樹者亦復如是惟加其節益用一寶如是諸樹種種各異行行相值莖莖相望枝枝相准葉葉相向華華相順果果相當如是行列數百千重間以寶池亦復如是乃至周遍世界榮色光耀不可勝視二華池樓觀二初分科二華池樓觀二初正明二釋經二初華池樓觀二初正明二初列經又舍利弗極樂國土有七寶池八功德水充滿其中池底純以金沙布地四邊階道金銀琉璃玻璃合成上有樓閣亦以金銀琉璃玻璃硨磲赤珠瑪瑙而嚴飾之池中蓮華大如車輪青色青光黃色黃光赤色赤光白色白光微妙香潔二釋義六初釋七寶池疏七寶池者觀經云一一池水七寶所成其寶柔軟從如意珠王生鈔七寶池從水得名故引觀經池水從七寶成而釋然娑婆世界水豈無之乃從天一而生故體非七寶寶豈無之乃從戊己而生故體非柔軟淨土之水柔而非陰寶而不剛淨穢所以異也不特此也彼經又云其摩尼水流注華間尋樹上下正以體非天一故不特可下而亦可上粗妙所以分也又不特此也彼經又云其聲微妙演說苦空無常無我諸波羅密復有讚嘆諸佛相好者如意珠王涌出金色微妙光明其光化為百寶色鳥和鳴哀雅常讚念佛念法念僧正以體即唯心無情說法苦樂所以別也次釋八功德水疏八德者唐譯云一澄淨二清涼三甘美四輕軟五潤澤六安和七除饑渴八長養諸根鈔此與觀經所列少異彼云輕清涼耎美不臭飲時調適飲已無患疏復以八德而對五入清是色入不臭香入輕冷耎是觸入美是味入調適無患是法入妙宗鈔云疏釋八德而對五入并前說法即聲入也雖成六入無非妙境故令行者速證無生又大本云八功德水湛然盈滿清淨香潔味如甘露彼諸菩薩聲聞諸上善人若七寶池中澡雪形體意欲令水沒足水即沒足欲令至膝水即至膝欲令至腰至腋以至於頸水亦如是欲淋灌其身悉如其意欲令其水如初即亦如初調和冷暖無不順適開神脫體滌蕩情慮清明澄潔瑩若無形三釋金沙布地疏金沙布地者觀經云黃金為渠渠下皆以雜色金剛而為底沙鈔此經但云金沙布地觀經云金剛以為底沙其文猶略具足言之應如大本云黃金池者底白銀沙水晶池者底琉璃沙珊瑚池者底琥珀沙有二寶為一池者其底亦以二寶若黃金白銀池者底沙則以珊瑚琥珀若珊瑚琥珀池者底沙則以硨磲瑪瑙若三寶四寶以至七寶共為一池則底沙亦如是此諸寶池有方四十里者有方五十里者有方六十里者如是展轉漸大以至於方二萬四百八十里若大海然是諸池者皆菩薩聲聞諸上善人生長之所有時浴於其間若彼佛池其方倍此皆七寶相間而成白月珠明月珠摩尼珠為之底沙四釋四寶疏琉璃此云不遠去波羅奈城不遠有此寶故以為名玻璃此云水玉鈔琉璃梵語具云吠琉璃此云不遠是故字體古作流離以是梵語故後人見是玉類故改從琉璃玻璃亦是梵語具足應云窣坡致迦其狀似此方水晶有赤白青三色字體亦應從坡離人見似玉故改從玻璃硨磲梵語具足應云牟浴揭拉婆此云青白色寶尚書大傳曰大貝如大車之渠渠謂車輞赤珠佛地論云赤蟲所出智論云真珠出魚腹中竹中蛇腦中不必唯生蚌胎也瑪瑙梵語摩婆羅伽隸此翻瑪瑙寶色如馬之腦故名字體舊作馬腦後人改從玉石五釋樓閣疏樓閣者觀經云衆寶國土一一界上有五百億寶樓大本云其講堂精舍宮殿樓觀皆七寶莊嚴自然化成復以真珠明月摩尼衆寶以為交絡覆蓋其上鈔大本又云阿彌陀佛講堂精舍皆自然七寶相間而成復有七寶以為樓觀欄楯復有七寶為之纓絡懸飾其側復以白珠明月珠摩尼珠為之交絡遍覆其上殊特妙好清淨光輝不可勝言其餘菩薩聲聞所居宮宇亦復如是彼諸天及世人所居宮宇樓閣稱其形色高下大小或以一寶二寶乃至無量衆寶悉化現而成六釋四華疏靈芝云車輪大小難為定準十住婆沙論云輪王千輻輪周圍十五里青色下觀經云一一池中有六十億七寶蓮華則非止四色一一蓮華團圓正等十二由旬非止如車輪也大本云池中蓮華或一由旬乃知百千由旬是知隨機所見優劣不同耳鈔寶池蓮華者一以為淨土中之莊嚴一以為念佛人之托生以極樂衆生無有淫欲故無男女無有男女故無父母無有父母故無胎生尚無胎生豈有卵生濕生宜其皆為化生第今所談極樂乃橫出三界正與娑婆世界平是以衆生生者以化為主而三義似兼有之以其托質蓮胎而花居水上故也故大本云十方無央數世界諸天人民以至蜎飛蠕動之類往生阿彌陀佛剎者皆於七寶池蓮花中化生自然長大亦無乳養之者皆食自然之食其容貌形色端正淨好固非世人可比亦非天人可比皆受自然清虗之身無極之壽然約下八品言之可也若上上品生乘金剛臺到即見佛不涉蓮生而即悟無生良有以也即解云隨機所見優劣不同亦由乎此二結成二初牒科次結成二釋經二初列經舍利弗極樂國土成就如是功德莊嚴二釋義二初正釋經文疏國界嚴飾皆是彌陀積劫熏修菩提行願之所成就鈔釋成如上種種嚴飾皆彌陀功德之所莊嚴功之言力德之言用此皆如來果上解脫大用以攝受衆生者遠討其因乃始心所發四十八願誓取樂嗣後經無量劫修行填願行滿而後願成願成而後土淨也次指所引文疏引文中言大本即無量壽經二卷廣談淨境言觀經即十六觀經廣明行相今經略說世稱小本即對大本而言也三金地天華二初牒科三金地天華二釋經二初列經又舍利弗彼佛國土常作天樂黃金為地晝夜六時雨天曼陀羅華其土衆生常以清旦各以衣裓盛衆妙華供養他方十萬億佛即以食時還到本國飯食經行舍利弗極樂國土成就如是功德莊嚴二釋義六初釋天樂疏天樂者觀經云無量諸天作天伎樂又有樂器懸處虗空如天寶幢不鼓自鳴大本云亦有自然萬種伎樂又有樂音無非法音清揚哀亮微妙和雅一切音聲所不能及鈔一切音聲所不能及者大本云如世間帝王有萬種音樂不如轉輪聖王諸音樂中一音之美百千萬倍如轉輪聖王萬種音樂不如忉利天王諸音樂中一音之美百千萬倍如忉利天王萬種音樂不如第六天王諸音樂中一音之美百千萬倍如第六天王萬種音樂不如阿彌陀佛剎中諸七寶樹一音之美百千萬倍復有自然種種妙樂而其音聲無非妙法清揚嘹亮微妙和雅十方世界音聲之中最為第一二釋黃金為地疏黃金為地者觀經云琉璃地上以黃金繩雜廁間錯兼以七寶界其分齊今言黃金乃地面莊嚴耳鈔今經小本從略若廣明者如大本云阿彌陀佛剎中皆有自然七寶所為黃金白銀水晶琉璃珊瑚琥珀硨磲其體性溫柔以是七寶相間為地或純以一寶為地光色照耀奇妙清淨超越十方一切世界其國廓曠蕩不可窮盡地皆平正無須彌山及金剛鐵圍一切諸山亦無大海小海及坑坎井谷亦無幽暗之所三釋曼陀羅華疏曼陀羅華此云白華亦云適意然彼國光明常照不假日月則無晝夜準大本經以華開鳥鳴為曉蓮合鳥棲為夜亦無四時春秋冬夏不寒不熱常和調適鈔白華適意乃四華中略舉其一具足應如法華天雨四華一曼陀羅華此小白華二摩訶曼陀羅華此云大白華曼殊沙華此云小赤華摩訶曼殊沙華此云大赤花大本又云有天優鉢羅華鉢頭摩花拘物頭花芬陀利花皆天花也以彼佛國土主伴依正皆有光明故無日月陰陽寒暑四時然而以花開鳥鳴為曉蓮合鳥棲為夜竊恐猶是凡聖同居淨土氣分與穢土將忘未忘之間以衆生生者多帶業往生故若上之三土則無此相也四釋衣裓疏衣裓即衣襟鈔真諦云外國盛花器也解存兩釋初釋為正以裓本衣襟況天花雨時何必尋器即以衣裓而盛之就襟拾花而散之散已放襟而忘之此淨土最適意之事也五釋供養疏供養十萬億佛者大本云承佛威力一食之頃往詣十方無量世界恭敬供養諸佛鈔此猶略文若具引者經云阿彌陀佛剎中諸菩薩承佛威神一食之頃遍至十方無量世界供養諸佛隨心所欲花香伎樂衣蓋幢幡無數供養之具自然化現在前珍妙殊特非世所有輒以奉佛及諸菩薩聲聞之衆或欲獻華者即於空中化成華蓋小者周圍四十里或五十里或六十里如是展轉漸大有至於六百萬里各隨其小大停於空中以成圓像勢皆下向以成供養光色照耀香氣普熏不可勝言既已用已隨其前後以次化沒諸菩薩復於空中共奏天樂以微妙音歌歎佛德聽受經法喜悅無量既供養已忽然輕舉還至本剎猶為未食之前六釋食時疏食時者午前也大本云若欲食時七寶鉢器自然在前百味飲食自然盈滿見色聞香自然飽足身心柔軟無所味著食已化去時至復現鈔大本具云其飯食時有欲銀鉢者有欲金鉢者有欲琉璃水晶鉢者有欲珊瑚琥珀硨磲瑪瑙鉢者或欲明月珠摩尼珠白玉紫金等鉢皆隨其意化現在前百味飲食充滿其中酸醎辛淡各如所欲多亦不餘少亦不缺亦不以美故過量而食惟以資益氣力食已自然消散而無遺滓或但見色聞香意以為食自然飽適無所味著身心清利既已用已自然化去再欲食時復現如前極彼剎中清淨安穩微妙快樂次於無為泥洹之道四靈禽說法二初牒科四靈禽說法二釋經二初牒科復次舍利弗彼國常有種種奇妙雜色之鳥白鶴孔鸚鵡舍利迦陵頻伽共命之鳥是諸衆鳥晝夜六時出和雅音其音演暢五根五力七菩提分八聖道分如是等法其土衆生聞是音已皆悉念佛念法念僧二釋義五初釋奇妙疏淨土珍禽與娑婆羽族不同故云奇妙如來順世而說譯人取類而翻鈔娑婆羽族雖有珍禽既非光明所化的係罪業所生安得稱為奇妙或者疑曰既非罪業何以同名故釋之曰蓋如來順世而說故譯人取類而翻其實不可以此方者比也次別釋衆鳥疏白鶴等三可解舍利此云春鶯或云鶖鷺迦陵頻伽此云妙音鳥在㲉中其音已超衆鳥共命兩首一身報同識異法華云命命是也鈔餘如文釋妙音鳥㲉字正書應從㲉有作鷇者非鷇音寇大論云頻伽在㲉聲逾衆鳥是也頻伽共命此之二鳥東方所無三釋和雅疏和雅者音聲悅人演暢者說法無滯鈔音聲雖悅人而不惑耳牽心說法既無滯則能生慧思修衆生皆不退者以此四釋道品二初正釋四初五根疏五根者一信二精進三念四定五慧能生聖道故名為根鈔三十七品助道之法譬猶樹焉始以聞法為種子以思修為種溉即四念處四正勤四如意足三者不失其候因緣成就則能生五根根既得力則能排厚地之五障布七覺支之枝葉以生八正道三昧之華果始娑婆而作清涼大樹也故法界次第初門釋云一信根謂信於正道及助道法則能出生一切無漏禪定解脫是名信根二精進根謂既信四念處正觀及諸助道善法倍䇿精進勤求不息是名精進根三念根謂但念正道及諸助道一心觀想不令邪妄得入是名念根四定根謂攝心正道及諸助道一心寂定相應不散是名定根五慧根謂四念之慧為定法所攝內性自照不從他知是名慧根次釋五力疏五力同上根名能排業障故名為力鈔一信力謂信正道及助道法若信根增長則能遮諸煩惱不為偏小諸疑所動故名信力二精進力謂行此正道及助道法時若精進根增長則能破諸懈怠放逸令一切正助道法成辨是為精進力三念力謂念此正道及助道法時若念根增長則能破諸邪想成就一切出世正念功德是為念力四定力謂攝心正道及助道法若定根增長則能破諸亂想發諸事理禪定是為定力五慧力謂四念處之慧照了一切諸法若慧根增長則能除一切邪妄之執破一切偏小之慧故名慧力三七菩提分疏菩提此云覺分或云支也一念覺二擇法覺三精進覺四喜覺五輕安覺六定覺七捨覺鈔一念覺念即思念謂修諸道法之時善能覺了常使定慧均平若心昏沉之時當念用擇法精進喜三覺分觀察諸法令不昏沉若心浮動之時當念用除覺分除身口之過非用捨覺分捨於觀智用定覺分入正禪定攝其散心令不浮動是名覺分二擇法覺擇即揀擇謂用智慧觀察諸法之時善能簡別真僞而不謬取虗僞之法故名擇法覺分三精進覺不雜名精無間名進謂修諸道法之時善能覺了不行無益苦行而於諸正法中常能用心專一無有間歇故名精進分四喜覺喜即歡喜謂心契悟真法得歡喜時善能覺了此喜不從顛倒法生住真法喜故名喜覺分五輕安一名除覺分除即斷除謂斷除諸見煩惱之時善能覺了除去虗僞之法增長真正善根故名除覺分六定覺定即禪定謂發禪定之時善能覺了諸禪不生煩惱妄想是名定覺分七捨覺謂離所見念著之境善能覺了虗僞不實永不追憶故名捨覺分四八聖道分疏八聖道諸經或云八正道一正見二正思惟三正語四正業五正命六正精進七正念八正定鈔謂此八法不依偏邪而行故名為正復能通至涅槃故名為道一正見謂人修無漏道見四諦分明破外道有無等種種邪見是為正見二正思惟謂人見四諦時正念思惟觀察籌量令觀增長是謂正思惟三正語謂人以無漏智慧常攝口業遠離一切虗妄不實之語是為正語四正業謂人以無漏智慧修攝其心住於清淨正業斷除一切邪妄之行是為正業五正命謂出家之人常離五種邪命利養常以乞食而活其命是為正命六正精進謂人勤修戒定慧之道一心專精無有間斷是名正精進七正念謂人思念戒定慧正道及五停心助道之法堪能進至涅槃是名正念八正定謂人攝諸散亂身心寂靜正住真空之理決定不移是名正定二指闕疏三十七品闕四念處四正勤四如意足三科故云等法鈔經既闕略解雖不補今當備出其義以為後學思修之助四念處者念即能觀之觀處即所觀之境也謂諸衆生於色受想行識五陰起四顛倒於色多起淨倒於受多起樂倒於想行多起我倒於心多起常倒為令衆生修此四觀以除四倒故名四念處也一觀身不淨身有內外己身名內身他人之身名外身此內外身皆攬父母遺體而成從頭至足一一觀之純是穢物衆生顛倒執之為淨而生貪著故令觀身不淨也二觀受是苦領納名受有內受外受意根受名內受五根受名外受一一根有順受違受不違不順受于順情之境則生樂受於違情之境則生苦受于不違不順之境則生不苦不樂受樂受是壞苦苦受是苦苦不苦不樂受是行苦衆生顛倒以苦為樂故令觀受是苦也三觀心無常心即第六識也謂此識心體性流動若粗若細若內若外念念生滅皆悉無常也四觀法無我法有善法惡法人皆約法計我謂我能行善行惡也善惡法中本無有我若善法是我惡法應無我若惡法是我善法應無我衆生顛倒妄計有我故令觀法無我也四正勤者一已生惡令永斷謂五蓋等煩惱覆心離五種善根故一心勤精進方便斷除不令更生也二未生惡令不生謂五蓋等煩惱惡法今雖未生後若生時能遮五種善根故一心勤精進方便修習令永不生也三已生善令增長謂五種善根等善法雖已生當守護令增長故一心勤精進方便修習令不退失也四未生善令得生謂五種善根雖未生為令生故一心勤精進方便修習令得生也四如意足者一欲如意足欲者希向慕樂莊嚴彼法故名為欲謂凡所修習一切諸法若無樂欲之心事必不遂若能樂欲所願皆得是為欲如意足二念如意足念者事注彼境一心正住故名為念謂若非一心觀法斷絶若能一心所願皆得是為念如意足三精進如意足謂唯專觀理使無間雜故曰精進凡所修習一切諸法若無精進事必不成若能精進所願皆得是為精進如意足四思惟如意足謂於彼境籌量審度故名思惟凡所修習一切諸法若無思惟則無所得悉不成就若能思惟所願皆得是為思惟如意足五釋正念疏孤山曰念佛如醫王念法如良醫念僧如瞻視人三者既備煩惱之病可瘥又觀自心寂而常照則諸法炳然名念佛照而常寂無法可得名念法寂照不二即存而亡名念僧此一體三寶也鈔孤山約二義而釋三寶一別相二一體於別相中又但出應念所以不云三寶之相言醫王等者蓋衆生生死之病根於煩惱欲治其疾非佛之大醫王不能知病而識藥應病而與藥故首之以念佛寶然而雖見之矣苟不聞法以求其治方合而服之則病不能愈故次之以念法寶雖能依法而思修苟無菩薩良友為同行為外護為節飲食示其忌諱而病亦莫能愈故又次加之以念僧寶若欲知其所念則以具足三身四智者為佛寶所說十二分教為法寶四十一位菩薩為僧寶佛滅度後又有住持三寶則範金刻木為佛寶西來貝葉為法寶剃𩬊染衣為僧寶如此二種若能歸之念之則煩惱之病本可瘥生死之病果可痊矣二一體者即文云又觀自心寂而常照云云等是也蓋佛名為覺覺即照也故以此心寂而常照諸法炳然者名佛寶法名不覺不覺即寂故以照而常寂無法可得者名法寶僧名和合寂照不二即和合義故以寂照不二即存即亡者名僧寶六釋生心疏靈芝云此界心垢常思五欲彼土心淨專念三寶兩土升沉於斯可見鈔夫對境生心雖佛聖賢亦不能無惟求其正焉而已娑婆世界塵境粗強故對境所生之心住而非正惟淨土耳中所聞無非妙聲故聞是音者皆悉生深念三寶之心正所謂生心而無住無住而生心者也二釋疑二初牒科二釋疑二釋經二初列經舍利弗汝勿謂此鳥實是罪報所生所以者何彼佛國土無三惡道舍利弗其佛國土尚無惡道之名何況有實是諸衆鳥皆是阿彌陀佛欲令法音宣流變化所作二釋義二初釋淨土惡道有名無體疏濁世禽畜罪業所招淨土何緣有此故云勿謂罪報所生故大本法藏比丘本願云設我得佛國中有地獄餓鬼畜生者不取正覺鈔濁世禽畜下疑問故云下釋疑故大本下引證次釋淨土惡道名體俱無疏然彼土清淨尚無惡道之名字況有罪報所生之實體乎皆是彼佛變化所作也故觀經云如意珠王湧出金色微妙光明其光化為百寶色鳥和鳴哀雅讚佛法僧靈芝云當知衆鳥即是如來神力欲使法音宣暢耳知非罪報所生也鈔然彼下正明其無皆是下明今有所以故觀經下引證靈芝下引同五風樹樂音二初牒科五風樹樂音二釋經二初列經舍利弗彼佛國土微風吹動諸寶行樹及寶羅網出微妙音譬如百千種樂同時俱作聞是音者自然皆生念佛念法念僧之心舍利弗極樂國土成就如是功德莊嚴二釋義二初引經類明疏大本云微風徐動吹諸寶樹演出無量妙法音聲其聲流布遍諸佛國聞其音者得深忍法觀經又云其摩尼水流注華間演說苦空無常無我諸波羅密次引文明淨疏孤山云雖寶樓金池為悅目之玩而非惑蕩之色而能達唯心無境矣雖風樹鳥聲有入耳之娛而非惉懘之音而能念三寶有歸矣鈔世人厭煩擾者必杜視聽于見聞以墮偏枯之失樂繁華者必恣任逸于聲色以縈紛擾之勞總之五濁惡世根塵皆穢苟無體空之觀又無析色之門進之退之孰能免過何如淨土不乏寶樓金池之玩兼風樹鳥聲之娛見色而不惑蕩聞聲而非惉懘無分別之勞矣而又能達境惟心深念三寶無偏枯之失矣淨土之妙從容中道聞而不求生者非夫也
