front:
  text: 彌陀略解圓中鈔序天台山幽溪沙門傳燈撰夫如來口密語意多含譬王索仙陀婆一名而具四實惟彼智臣善解其義俟王之若出若食若飲若戰一唱乎此則奉之以馬以鹽以水以器莫不會王之心適王之意菩薩智臣亦復如是善解如來之所說法於淺法中作深說深法中作淺說亦淺亦深法中作非淺非深說非淺非深法中作亦淺亦深說造論弘經豐約適所既不令智退亦不使義闕然後可謂升其堂而入其室也此佛說阿彌陀經乃釋迦如來於深法中作淺說廣法中作略說者也說既略矣而智臣為之解不得不略義既深矣而智臣為之解不得不深解略不令其智退理深不令其義闕以略探廣從容中道余於吳門蘧菴大師略解見矣其序有曰瓊林玉沼直顯於心源壽量光明全彰於自性又曰了唯心之本具億剎非遙知大願之可憑三祇橫截噫括盡全經厥語何其略惟心本性厥義何其深微菩薩智臣烏能至於是乎今為之鈔而特題為圓中者意以極樂依正為妙有一心持名為真空微真空而莫能證於極樂之妙有微妙有而莫能顯於此心之真空所謂不思議假非偏假真空不空非但空合是二者而行之則圓中圓滿非但中之道成是故命為鈔焉意欲讀是經而修行者顧名思義誠宜一心不亂而萬慮皆忘則真空之理彰七日持名念念相續則妙有之理顯行成而見佛心淨而華開娑婆之印壞而極樂之文成印壞所以空其情是之謂真空文成所以立其法是之為妙有二者俱忘而俱存彌陀之經厥語所以略厥義所以深爰因鈔次故揭題義而漫為之序云皇明天啓龍飛之初年季冬哉生明下筆故序阿彌陀經略解圓中鈔佛說阿彌陀經略解序明吳郡沙門大佑述天台山幽溪沙門傳燈鈔次能述人師字蘧菴大佑其諱也為蘇州北禪天台講寺住持精于教理其於淨土一門尤得其妙有淨土指歸集盛行于世其俗姓桑梓尚俟詳考三所述序二初序說經之由次序略注之由初為二初序緣起次序說經初又二初推尋源流次正序緣起初為二初真源不二次妄派成殊蓋言約真源則一性之中原無苦樂之殊則何須如來出世說經唯妄派成殊故我佛示生演教今先明真源不二疏夫寂光真淨初無苦樂之殊鈔寂光者四種淨土之一也四淨土者一凡聖同居淨土二方便有餘淨土三實報無障礙淨土四常寂光淨土各有淨穢唯上品寂光為真實淨土餘之淨土皆帶虗設故又復應知真淨之言非離三土別有寂光可得只指下三土之體理本究竟與寂光更無差別故四明尊者妙宗鈔云須知四土有橫有豎仍知橫豎只在一處如同居土趣爾一處即是實報若破無明轉身入者斯是法身同佛體用稱實妙報則六根淨人亦莫能預豈居二乘此則一處竪論實報若未破無明即身見者此乃諸佛及大菩薩為堪見者加之令見實報土也蓋有機緣雖未破惑已修中觀如華嚴會及諸座席雜類之機咸見身土難思者是實報既爾方便寂光橫論同處亦復如是於同居處論三土橫竪於方便處論二土橫竪於實報處論一土橫竪至寂光處無橫無竪當處亦無今云寂光真淨乃直標真體也初無苦樂之殊彰離過絶非也蓋以四土淨穢言之於同居娑婆則惟苦無樂清泰惟樂無苦以方便對同居言之則同居惟苦無樂方便惟樂無苦以方便當土言之則方便穢惟苦無樂方便淨土惟樂無苦以實報對方便言之則方便惟苦無樂實報惟樂無苦以實報當土言之則實報穢惟苦無樂實報淨土惟樂無苦若以實報對寂光言之則實報惟苦無樂寂光惟樂無苦以寂光當土言之則寂光穢惟苦無樂寂光淨土惟樂無苦已上皆約修成不二而二言之故有苦樂之殊今序云初無苦樂之殊者乃約性具十界五陰國土惟有十界苦樂圓融之性而無十界苦樂差別之相即生佛等有真如不變之體本無淨穢之殊何有苦樂之異故此一句科為真源不二以為下妄派成殊張本楞嚴所為性覺妙明本覺明妙又曰清淨本然周遍法界是也四種淨土具如下釋次妄派成殊疏妄識紛紜遂有聖凡之異鈔妄識者三惑之總名也蓋衆生無始已來從性覺妙明本覺明妙中一念俄然晦昧而妄為明覺因明立所所既妄立生汝妄能無同異中熾然成異因而為三細之無明塵沙因而為六粗之見惑思惑一變而為寂光穢土二變而為實報穢土三變而為方便穢土四變而為同居穢土如是為菩薩為聲聞緣覺為六道衆生故曰妄識紛紜遂有聖凡之異楞嚴所謂隨衆生心應所知量華嚴所謂能隨染淨緣遂分十法界是故科為妄派成殊又復應知初句雖云寂光真淨初無苦樂之殊不妨乎不殊而殊即性具十界也次句雖云妄識紛紜遂有聖凡之異不妨乎異而不異即在性無殊也良由真如雖不變不妨乎不變而隨緣妄識雖隨緣不妨乎隨緣而不變以緣緣故是以不殊而殊以不變故是以異而不異能知乎此方能了今念佛之心乃全性以起淨修全修而在一性也次正序緣起疏由是漂流五濁莫返一真故我釋尊示生堪忍鈔此正序如來說經之緣起也蓋釋迦如來久證真常何有王宮之受生但因一切衆生無始墮落故有娑婆之出世漂流五濁者謂衆生無始以來從涅槃性海鼓識浪以揚波弊澄圓而失湛渣滓明妙汩沒性真良由先失之以動故曰漂流楞嚴所謂覺明空昧相待生搖是也次失之以昏故曰五濁楞嚴所謂晦昧為空是也然而昏必具動動必具昏是則流即濁也濁即流也昏動之惑既形明靜之真即失但此五濁有粗細不同如楞嚴之言劫濁云汝見虗空遍十方界空見不分有空無體有見無覺相織妄成是第一重名為劫濁此則兼三惑而言之也若如尋常所說人壽二萬歲時方入劫濁此則獨指見思二惑最熾盛時以言之也然而或有細不兼粗而未嘗有粗不兼細今但正指釋尊示生堪忍之時而粗者適當其情若曰莫返一真亦是兼細以言之也示生堪忍正當垂應凡聖同居穢土且言劣應丈六老比丘身相而已若亦兼細惑而言則義含垂應上之二土也次序說經分二初序住處機宜次序所說法要今先序住處機宜疏當祇園之嘉會告身子之利根鈔祇園嘉會說經之住處也身子利根所被之當機也論此經所被機宜厥品有三一菩薩二二乘三凡夫蓋淨土法門諸小乘經絶口不談以子果既盡則灰身滅智不說身後有生今盛談之乃菩薩之法門也若原此經說在方等正彈偏斥小歎大褒圓之時彈斥小乘界外不生故云有生而特指彼國有無量無邊聲聞弟子又極口稱揚彼土依正二報微妙莊嚴則歎大褒圓寓其中矣況舍利弗又為衆弟子中上是以告之令回小以向大也若正所被機乃居博地七日持名一心不亂即得往生一預嘉會得不退轉以是而觀雖在凡夫義屬圓頓又可知也次所說法要為四初序經名次序經體三序宗要四序力用能詮所詮不出此四是故括而序之以盡一經旨趣可謂善通大乘者也今初序經名疏開法藏之願門指樂之妙土鈔此經備說依正及以徒衆為能詮名而經題但云佛說阿彌陀大師觀經疏所謂舉正報以收依果述化主以包徒衆是也是則題但言正乃舉正以收依序但言依乃舉依以收正影互言之文法之巧也論此經無開願門之文以有大本詳言是故略而不說次序經體疏瓊林玉沼直顯於心源壽量光明全彰於自性鈔瓊林玉沼略舉所說依報從七重欄楯去至寶樹寶網出微妙音一節經文壽量光明略舉所說正報從彼佛何故號阿彌陀去至但可以無量無邊阿僧祇說一節經文直顯於心源全彰於自性二句正序其體蓋此經以實相印而為正體無相不相相而無相名為實相夫瓊林玉沼壽量光明固一切諸法之相也然則直顯于心源全彰於自性顧何相之可得哉此正無相不相相而無相之正體也惟心淨土本性彌陀之妙法第言之雖易理亦難精玄悟旨歸必有至當試欲明之非天台法性之宗而不可何也蓋極樂國土遠在十萬億剎之外阿彌陀佛乃智斷圓滿清淨具足果人博地凡夫污染於三惑沉淪於二死造無窮之業繫作不盡之生因何能頓感彌陀即生淨土橫截五道便階不退哉正由一家之談衆生法性厥義有三一日性量則周遍於十方而互徹無外十萬億剎外之極樂在吾性量方近近之一隅一日性體則常住堅凝者清淨皎潔彌陀智斷圓滿之覺體與吾性體正究竟而無差一曰性具然若但云無外無差而不知有性具法門雖曰無外而終成有外雖曰無差而終成有差且不知性量性體之德從何故而周遍依何法而清淨當知有性具者在則向之言體德體量者皆吾性具為之本也三性之旨具如生無生論中發明茲不繁列三序宗要疏衆聖同處非少善之得生七日持名在一心之不亂鈔下釋題五章中以信願淨業為一經宗要今括經文取略敘之但言淨業蓋三要中此居其正故也初句即經云彼佛有無量無邊聲聞弟子皆阿羅漢非是算數之所能知諸菩薩衆亦復如是又曰極樂國土衆生生者皆是阿跋致其中多有一生補處其數甚多非是算數之所能知但可以無量無邊阿僧祇說又曰衆生聞者應當發願願生彼國所以者何得與如是諸上善人俱會一處次句即經云不可以少善根福德因緣得生彼國故曰衆聖同處非少善之得生三四句即經云若有善男子善女人聞說阿彌陀佛執持名號若一日若二日乃至若七日一心不亂正以瓊林玉沼直顯於心源壽量光明全彰於自性衆生從無始已來昏動因緣漂流五濁莫返一真今將返本還源莫先照昏寂動七日持名所以照其昏也一心不亂所以寂其動也昏動苟忘不真何待譬如塵淨鏡明風恬浪靜然七日持名便階不退者正顯教屬圓頓不待一生願力弘深慈悲與拔本功德力不可思議誠速出生死之要津行菩薩道之亨衢也四序力用為二初正明力用疏事理體一生佛原同無緣之慈不謀而應鈔此經以離苦得樂為用即經云其人臨命終時阿彌陀佛與諸聖衆現在其前是人終時心不顛倒即得往生阿彌陀佛極樂國土是則此之力用關乎與拔與拔之功在乎感應衆生以一心持名為感彌陀以拔苦與樂為應拔苦之道本于悲與樂之道本于慈悉係天性相關毫非勉強行人則以事理體一生佛原同之道為感彌陀則以無緣之慈不謀而應之道為應豈非彌陀以不來而來來此娑婆接引行人行人以不往而往往彼極樂覲禮彌陀此實一經力用所憑之理本也次所發功勳疏了惟心之本具億剎非遙知大願之可憑三祇橫截鈔前文既先明力用之理本矣憑之而念佛求生能了事理體一生佛原同則十萬億剎之遐方皆我惟心本具雖遠不遠能知無緣之慈不謀而應則四十八種之大願無緣可憑識流可截如是力用豈不勝乎言三祇橫截者此明超出三界有橫竪二義若婆沙論明三藏菩薩三阿僧祇劫修六度萬行百劫種相好因然後階不退轉獲五分法身此從竪出自下升高如兔馬渡河紆回曠久若依此經求生極樂者若已生若今生若當生皆得不退轉於阿耨多羅三藐三菩提又曰衆生生者皆是阿跋致此從橫出即此達彼如香象截流一念可獲故此力用最為殊勝次序注解之由二初正序三初序廣解之由疏經文簡約佛旨玄微持誦雖多研詳實寡鈔此經不出千言備詮惟心淨土本性彌陀之旨可謂經文簡約佛旨玄微矣況彌陀世尊偏與娑婆衆生有緣故聞此法門莫不欣然頂受兼之此經言簡易持逗機易信是以若僧若俗莫不讀誦受持第文顯可窺而理深罕究致令佛意反晦而不彰則前賢之解又不得不廣也次序略解之由疏惟前賢之著述嗟末俗之罕聞鈔前賢著述如序後別列若慈恩孤山等諸師各有著述或文辭繁廣或義理深玄不便初機故末俗罕聞則今之略又不得不出也三正序略解為二初序謙光疏竊效流通略申援引鈔流通者金光明疏云流名下澍通名不壅欲使正法之水從今以澍當聖教筌不壅于來世大師謙言私竊倣效古人之流通大法是故略申援引諸解成言以為略解然於其間或用義而不用辭略義而不略意以成一家之言如出一人之筆可謂善乎著述者也次序己志願疏願與同志普結淨緣咸契無生同登不退云爾鈔初二句乃以私解而公人與同志者廣結佛國清淨之緣次二句乃以己欲而施衆與同聞者契登無生不退之位正菩薩自利兼人之志開士大悲曠濟之懷也四傍序疏唐慈恩法師造彌陀通讚一卷宋孤山淨覺靈芝諸師皆有疏記三衢倫師古崖新師皆有集注今欲從略以便初機故茲別出各從其志鈔唐慈恩下序古師注今欲從下序己所注此經持誦既廣注疏必多今之所引涉于見聞者屈指六師而已以余近所見者又有宗月溪法師之科注國朝洪武間普智法師之科釋近今蓮池法師之疏鈔若從簡略則此解為最願求博覽亦各從其志也
