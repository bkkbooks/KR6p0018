body:
  text: 明永樂吳郡沙門大佑解天啟天台沙門傳燈鈔二正報二初分科二正報二初教主名號二初徵名二釋經二初教主名號二初徵名二初列經舍利弗於汝意云何彼佛何故號阿彌陀二解義審其解否次為釋通二釋義二初分科二釋義二初名含二義二初光明無量二釋經二初名含二義二初光明無量二初列經舍利弗彼佛光明無量照十方國無所障礙是故號為阿彌陀二釋義三初引大本明光明無量疏大本云阿彌陀佛威德光明最尊第一諸佛光明所不能及鈔此猶略引若具引者阿彌陀佛光明明麗快甚絕殊無極勝于日月之明千萬倍而為諸佛光明之王故號無量壽佛亦號無量光佛無邊光佛無礙光佛無對光佛炎王光佛清淨光佛歡喜光佛智慧光佛不斷光佛難思光佛難稱光佛超日月光佛其光明所照無央數天下幽冥之處皆常大明諸天人民禽獸蜎飛蝡動之類見此光明莫不喜悅而生慈心其婬泆瞋怒愚痴者見此光明莫不遷善地獄餓鬼畜生考掠痛苦之處見此光明無復苦惱命終之後皆得解脫不獨我今稱讚阿彌陀佛光明十方無央數佛菩薩緣覺聲聞之眾悉皆稱讚亦復如是若有眾生聞此光明威神功德日夜歸命稱讚不已隨其志願必生其剎復為諸菩薩聲聞所共稱讚當亦如是我說阿彌陀佛光明威神巍巍殊妙晝夜一劫尚未能盡令為汝等略言之耳次引觀經明光明之用疏觀經云徧照十方念佛眾生攝取不捨鈔彼經具云無量壽佛有八萬四千相一一相中有八萬四千隨形好一一好中復有八萬四千光明一一光明徧照十方世界念佛眾生攝取不捨疏云若為佛慈悲所護終得離苦永得安樂釋論云譬如魚子母若不念子則爛壞眾生亦爾佛若不念善根則壞三設問答釋或者之疑疏或問光明無量我何不見答杲日麗天瞽夫不覩是盲者咎眾生障重如處覆盆之下非日光之不普也鈔杲日下喻佛光本自周徧瞽夫下喻眾生無目不覩眾生下合下二句非日光下合上一句蓋佛有三身光明亦然若法報身之與光則無處而不周無時而不在應佛身之與光則隨其機之所在而示光現之然此三佛身之與光皆須機感而後得見如觀經云諸佛如來是法界身入一切眾生心想中此言法報二身無所而不遍也又云是故汝等心想佛時是心即是三十二相八十種好是心作佛是心是佛諸佛如來正遍知海從心想生此則正言三身皆須機感而見機若熟時不惟得見于應亦得見于法身報身也二壽命無量二初標科二壽命無量二釋經二初列經又舍利弗彼佛壽命及其人民無量無邊阿僧祇劫故名阿彌陀二釋義二初引大本明壽無量疏阿僧祇此云無數大本云彼佛壽命不可稱計假使十方世界眾生皆成聲聞緣覺竭其智力於百千劫悉共推算不能窮盡鈔大本具云佛告阿逸多言汝欲知阿彌陀佛壽命無極否阿逸多對言誠欲聞知佛言明聽悉令十方無央數世界諸天人民以至蜎飛蝡動之類皆得為人又皆作緣覺聲聞共坐禪一心合其智慧為一智慧以計數彼佛壽命幾千億萬劫無有能知者次引大本明本願所致疏法藏本願云設我得佛國中人民壽命無能限量若不爾者不取正覺鈔此大本第十四願文具云我作佛時我剎中人壽命皆無央數劫無有能計知其數者不得是願終不作佛二道成十劫二初標科二道成十劫二釋經二初列經舍利弗阿彌陀佛成佛已來於今十劫二釋義三初會通前文疏前總告云今現在說法此示已成佛之劫數也次會通二經疏大本云成佛已來凡歷十劫唐譯云經十大劫皆是一期赴機之說三會通勝應疏然勝應身彌亘三際充徧十方其可以劫數測量其久近耶鈔佛之應身有勝劣兩相劣則示同凡夫如釋迦丈六劣應之身壽八十年同于灰斷若如華嚴勝應之身壽則不可思議以其即應即報故故華嚴之佛亦稱為報乃他受用報身也彌陀劣應同於人民以云彼佛壽命及其人民無量無邊阿僧祇劫故然而雖云無量既有觀音稱為補處豈非劣應亦有量乎但是即劣而勝非同濁世歸于泥洹以彌陀機息應轉觀音機興應起義當補處故也二眷屬莊嚴二初分科二眷屬莊嚴三初弟子無量二釋經三初弟子無量二初列經又舍利弗彼佛有無量無邊聲聞弟子皆阿羅漢非是算數之所能知諸菩薩眾亦復如是舍利弗彼佛國土成就如是功德莊嚴二釋義七初釋聲聞眾疏聞四諦聲教悟道故名聲聞鈔教門有聞聲而悟道者觀音所修初於聞中入流亡所是也此圓頓乘非小乘比有聲聞而悟道者揀異獨覺觀物變易自悟無生今則自不能悟必假聞佛說四諦聲教而後知三界苦諦之果斷見思集諦之因慕涅槃滅諦之果修戒定慧道諦出世之因以是之故名曰聲聞次揀異三果疏皆阿羅漢者揀非前三果也鈔聲聞者賢聖之通稱也故七賢四果皆曰聲聞經云皆阿羅漢者專就果言故曰揀異三果三明無緣覺疏不言緣覺者攝在聲聞數中鈔聲聞緣覺修法雖異同破見思同出三界同證偏真故可攝在聲聞教中四明無二乘疏天親論云二乘種不生今言回心向大故得生以慣習小故權證二乘不久證大也鈔天親下引論文牒成難辭也今言回心下引觀經疏釋其疑惑也即天親菩薩所造無量壽經論有十七成就至第十六大義門成就中偈云大乘善心男等無譏嫌名女人及根缺二乘種不生長行釋云故淨土果報離二種譏嫌過一者體譏體有三一二乘人二女人三諸根不具足人無此三種過故名離譏嫌也彼土果報非但無體三名亦無故觀經疏設問云彼往生論二乘不得生此經中輩小乘得生答正處小乘不生要由垂終發大乘種爾乃得生經說現生論舉本始又問何故復證小果釋曰雖復垂終發大心先多學小至彼聞苦空無常發其本解先證小果得小果已於小不住必還入大今解文中取意為答其義甚明五菩薩無量疏而不獨聲聞無量菩薩亦無量也鈔須知彼土正為攝諸菩薩欲先增長善根功德者往生第無機不攝故不拒凡夫及與二乘令其生彼莫不發廣大心修圓頓行登菩薩位正顯極樂法門廣大圓滿也六判教傍正疏聲聞通兩教二乘菩薩通四教正意在圓教鈔聲聞通兩教二乘者藏教析色觀空通教體色觀空之機也菩薩通四教者藏教事六度通教理六度別教恒沙法門圓教無作妙行之機也此皆約此土求生之人具四教機生于彼土各順本習而為大為小為偏為圓覩四教之佛聞四教之法或權證小果或實證大乘非久之閒皆入圓位故其正意的在圓教如萬流歸海同一醎味也七結歸化主疏然樂殊勝海眾無邊皆是彌陀願力成就也鈔極樂國土非獨依報莊嚴清淨殊勝即眾生生者大異娑婆正以此方世界人雖萬殊判其品類大約惟三曰善曰惡曰出世閒惡淪四趣固不暇言即善昇人天福盡還墮惟出世閒可以長揖三界一去不來第因豎出登陟良難蓋塵境粗強誠為險處須彌失足墮落何疑總不如極樂法門橫出三界平夷坦直皆可向歸十方國土求生者多得生彼國海眾亦廣所謂夕孕金華列宿猶慚于海滴晨遊玉沼世燈強喻于河沙十方爰來四生利往彌陀願力庸可思議二生者不退二初標科二生者不退二釋經二初列經又舍利弗極樂國土眾生生者皆是阿䟦致二釋義二初釋不退疏阿䟦致此云不退轉下文云皆得不退轉於阿耨多羅三藐三菩提則知生彼國者雖下品凡夫直至成佛更無退墮鈔若約教明不退轉位有三謂位行念也今云不退轉者無論入此三位即博地凡夫生彼國者雖未斷惑亦不退轉如十疑論云彼國五因緣故不退一彌陀願力攝持二佛光常照三水鳥樹林常演說法四純諸菩薩為友五壽命永劫次引證大本疏大本云其有眾生生彼國者皆悉具足三十二相諸根明利乃至成佛不受惡趣神通自在常識宿命於此世界有六十七億不退菩薩往生彼國鈔所引大本文有兩段初是一生補處分中節文次是菩薩往生分中節文須者往閱三補處甚多二初標科三補處甚多二釋經二初列經其中多有一生補處其數甚多非是算數所能知之但可以無量無邊阿僧祇說解釋義三初通釋其位疏一生補處即等覺也亦名最後身謂次當作佛惟餘一生鈔等覺者與果佛妙覺將等猶此方之亞聖也最後身者煩惱究竟生分已盡惟此一生在更不受變易後有也故曰次當作佛惟餘一生次的指其人疏若此土彌勒是也彼土則觀音次補佛處勢至又補觀音處鈔此土彌勒補釋迦處至於成佛仍號彌勒若觀音次補彌陀之處則改號普光功德山王如來勢至次補觀音之處則改號善住功德寶王如來或問曰彌勒補處今居兜率觀音補處亦居內院否對曰此方穢土故凡補處先居兜率將成佛時要當下生示為凡夫脩而後得彼淨土但如天王世子位居儲君以待彌陀應謝即登佛位何須現迹示居天宮三引大本證疏大本云彼國菩薩皆得究竟一生補處除其本願為眾生故以弘誓鎧而自莊嚴其數甚多不可稱計故云阿僧祇也鈔大本具云諸往生者皆具足三十二相究竟深入妙法要義諸根明利其初鈍根者成就二忍利根者得不可計無生法忍皆當一生遂補佛處所以者何彼佛剎中皆住於正定之聚無諸邪聚及不定之聚復無三種過失一者心無虗妄二者位無退轉三者善無唐捐所以生於彼者有進無退直至成佛惟有宿願速度眾生則以弘誓功德而自莊嚴入他方生死界中作師子吼說法度脫爾時阿彌陀佛以威神力令彼教化一切眾生皆發信心乃至成佛於其中閒不受惡趣神通自在常識宿命雖生五濁惡世形迹與同其清淨快樂無異本剎二修證行法二初分科二修證行法四初信願二初發願求生二釋經四初信願二初發願求生二初列經舍利弗眾生聞者應當發願願生彼國二釋義二初釋相疏願能導行如牛挽車要須御者則能有所至淨佛國土由願引成鈔願能導行法也如牛挽車喻也牛車喻行御者喻願淨佛國土下合也御車達到即是寶所淨佛國土即其事也淨土有因其引因者莫先乎願故願為行首次引證二初引天親疏天親論云菩薩所修善根不為自身欲拔一切眾生苦故攝取眾生同生彼國鈔引天親論者明淨土之願雖曰願生彼國其實不為自求欲學佛慈悲拔苦與樂論云欲拔生苦即悲義拔苦攝生彼國即慈義與樂是則今願應該四弘次引四明疏四明云但為戒福不精無往生願故在穢土聞法入真須懼娑婆不常值佛塵境麤強誠為險處致多退失故須外加事懺內勤理觀加願要制必於寶剎速證無生鈔引妙宗鈔文雖專在自利而意亦利人文兼行願同前如牛御車要在御者然其行中又須正助兼行故曰外加事懺內勤理觀必於寶剎速證無生二聖賢聚會二初牒科二聖賢聚會二釋經二初列經所以者何得與如是諸上善人俱會一處二釋義二初釋諸上善人二初泛指三品疏諸上善人者指前聲聞菩薩一生補處也鈔諸上善人大略三品一聲聞眾二諸位菩薩三等覺菩薩次的指勝者疏慈覺云娑婆國土觀音勢至徒仰嘉名極樂世界彼二上人親為勝友如染香人身有香氣鈔娑婆下言此土勝友難逢此指正象末法可也若如來在世西印土人亦與恒會極樂下言彼方菩薩易見不特易見且親為勝友如染香下舉經喻之如染香人身雖非香以染香故而身有香氣喻生淨土者雖未入位以念佛故而菩薩與居二釋俱會一處疏以不退菩提故同佛所證謂同法性身同常寂光土故云俱會一處鈔一處者非徒曰與諸上善人俱會事相之一處葢俱會所證理性之一處也即能居之法性身所居之寂光土方名真一處也二修行二初分科二修行二初反顯餘善不生二釋經二初反顯餘善不生二初列經舍利弗不可以少善根福德因緣得生彼國二釋義四初釋少善根疏靈芝云欲顯持名功勝先斥餘福為少善根施戒禪誦一切福業若無正信回向願求皆為少善非往生因鈔解中有簡有收簡之則若無信願回向皆為少善根福德因緣非往生之正因收之則若有信願回向皆為多善根福德因緣是往生之助行次釋多善根疏若依此經執持名號發願往生方名多善根也鈔此經往生正因的在一心持名發願回向如是善根其功也多其根也深決得往生永為佛種三明正與助疏善因名正行謂執持名號一心不亂福德約助行鈔佛之大道非正無以為行門非助無以為資粮更加發願要制方能速證無生四引證助行疏觀經云欲生彼國者當修三福一者孝養父母奉事師長慈心不殺修十善業二者受持三歸具足眾戒不犯威儀三者發菩提心深信因果讀誦大乘勸進行者如此三事名為淨業皆往生之助行也鈔觀經疏云第一孝養父母奉事師長敬上接下慈心行也修十善業是其止行身除三邪口離四過意斷三惡也妙宗鈔云此經正被頓修之機雖修佛行父母師長豈不孝事輪王十善豈不止行但能修之心一一稱性何妨所修慈孝之善共於凡夫觀經疏云第二三歸者佛法僧在家戒亦即是十戒具足眾戒者道俗備受微細不犯威儀者三千悉皆不缺也妙宗鈔云圓頓行者豈違小乘出家之式三歸眾戒威儀等事但受持之心合於一體依於畢竟而所行之法共於二乘觀經疏云第三發菩提心是願起意趨向名為發心菩提是道佛果圓通說為菩提讀誦大乘明修解也行能運通說之為乘餘二不及是言大也妙宗鈔云依無作境起無緣誓名發菩提心實相不二而二立因果殊二而不二始終理一信此因果方名為深讀誦大乘修三智解運圓乘行以此解行教其行者名為勸進此三種業得前前者不得後後得後後者必得前前故今行人能修前二前二不能修於大乘故云餘二不及是言大乘皆往生之助行也二正示持名方法二初牒科二正示持名方法二釋經二初列經舍利弗若有善男子善女人聞說阿彌陀佛執持名號若一日若二日若三日若四日若五日若六日若七日一心不亂二釋義五初釋執持之義疏孤山曰執謂執受持謂任持信力故執受在心念力故任持不忘鈔執持者執而後持亦名受持故解曰執謂執受然則聞而不信不足以為執受又曰持謂任持加人有力堪任持物是則信而不念不足以為任持故曰信力故執受在心念力故任持不忘次釋若字之義疏若者不定之辭利根一日一念鈍根或至七七日行成縱未破惑定為往生之因鈔經文既云若矣又增數至於七日是則往生之因要在持名階於一心不亂而人根利鈍日數限乎七等若利根者一日成乎一念鈍根至於七日而解中又增云七七者此或約極鈍根者為言或約行門逾增勝者而說然則持名一心不亂者因也得一念者約行成而為言也縱未破惑定為往生之因者此言一念之力有伏惑之功也葢言若能伏惑臨終正念自然現前往生淨土必矣三釋一心不亂二初總標疏一心不亂有事有理二分釋二初事一心疏事一心者行者繫緣憶念阿彌陀佛相好光明無分散意念念無閒名事一心鈔繫緣憶念者觀也阿彌陀佛等境也無分散意念念無閒者念力勇猛能排雜念使內心不起外境無侵也下文雖明理中一心要須先假持事中一心以為其本理中不過用解力而融之通之使無滯事相以為殊勝之因苟微乎此曷能成就一念伏惑之功耶次釋理一心二初明一心三觀疏理一心者了達能念之心所念之佛皆無自性雖本來空寂而感應道交如鏡像水月任運顯益當處皆空全體即假二邊叵得中道不存三諦圓融絕思絕義名理一心鈔了達下明即空義言能念所念皆無自性者此約四性而體達無生也應云亦無他性共性無因性文之略也此中宜以能念之心本空為無自性所念彌陀本空為無他性感應道交如境像水月為無共性任運顯益為無無因性此乃攝後歸前以明無有四性也次雖本來空寂下明即假也上二句約法明假下二句約喻明假乃以形之與水喻感鏡之與月喻應鏡月本無心而自然現乎影像形水亦無意而法爾感乎鏡月功至往生任運顯益也當處皆空者有即空也全體即假者空即有也有即空則有即非有空即有則空即非空非空非有則中道昭然即空即有則中道亦亡故曰二邊叵得中道不存如是則所觀之境三諦圓融能觀之心絕思絕議事理二門已如解中略示若欲更明其旨則又有橫豎二種不同橫論三觀則能念屬乎三觀所念屬乎三諦如正稱名時了能稱心非內非外無形無狀即空觀雖非內外形狀而此能念之心歷歷分明即假觀而此能念非離假而有空亦非離空而有假雙遮雙照即中觀所稱佛名及以音聲如谷中響如水中月了不可得即真諦雖不可得而佛號音聲宛然在口顯然在耳即俗諦而此所念亦非離真而有俗亦非離俗而有真俱存俱忘即中諦此橫論三觀三諦也若豎論者祗以一心不亂萬緣俱寂者為空觀以所念六字聖號朗朗分明者為假觀能念雖空而念者宛然所念雖假而谷響不實如是則即空不空而空即假即假非假而假即空雙遮雙照境觀雙忘所謂境為妙假觀為空境觀雙忘即是中忘照何嘗有先後一心融絕了無蹤若然者求生淨土之人但以一心不亂而執持名號祇執持名號而一心不亂無邊妙義咸在其中不思議觀非離當體可謂全性起修全修在性也又須了知經中之意一心不亂欲使因果名目相應也執持名號欲使生佛感應道交也因果名目相應者極樂稱為淨土惟其心淨而後佛土淨但心淨土淨其義甚通圓伏五住圓破三惑皆名心淨而此心淨感佛土淨則圓該四土今是同居淨土只須一日至於七日執持名號一心不亂以為心淨往生之因二生佛感應道交者彌陀妙應既是果人復有宿誓令我持名是故必須執持名號以為心淨往生之因故一心不亂與執持名號二義相須闕一不可故此經宗須以四句料簡一是一心非持名即尋常修禪與夫一心修諸眾行又無回向發願悉非往生正因二是持名非一心即散心持名雖是佛乘緣種亦非往生正因三非一心非持名即悠悠凡夫作諸善事亦非往生之因四是一心是持名方是此經所說往生正因若約此經說在方等收四教機以判一心則有四種行人不同一藏教人心佛實有惟約事相判心不亂以此為因加之信願臨終果熟即得往生今之凡夫未通至理惟關閉六情不出不入而一心持名或用心推究種種剖析皆藏教人一心持名也二通教人善能了達若心若佛如幻如化佛本是無心亦何有聲如谷響佛如鏡像如此體解當處無生此通教人一心持名也三別教人先能達空亦能達假以我空心而造假佛非惟佛有不妨心有然以空心而念假佛空既不空假亦不假非假非空見於中道此別教人一心持名也四圓教人能達淨土唯心彌陀本性即真俗中觀中空假有念無念無非法性無佛有佛皆是真如終日有念終日無念以無念念相有相相無生而生生而無生此圓教人一心持名也此約方等時義釋如是若約法華開權顯實者應會前教悉歸圓頓以藏教人關閉六情制心不亂為我圓教事中一心通教如幻為我圓教即空一心別教出俗為我圓教即假一心圓本相即不須和會以法華妙具二妙故前圓教一心為法華相待論妙今統會歸為法華絕待論妙是故圓家行人已聞妙法深悟圓理以起圓宗如此力用圓融無礙了事乃即理之事理乃即事之理是以一心持名時事一心可也理一心可也事理相即一心可也念念無非法界心心皆即真常如是念佛功德最大能伏五住煩惱能破一心三惑能淨四種淨土能見三身彌陀是為不思議念是為無功用念永明所謂有禪有淨土猶如戴角虎今世為人師來生作佛祖此偈正為圓頓人一心持名者說也次明性具宗旨疏須了達法界唯心心外無境彌陀相好元是自心十萬億剎不踰當念以性具諸法故不從他得鈔法界有三義一性具即三千十界也一性體即清淨本然一真如法界也一曰性量即一真法界豎窮橫遍之界量也三種法界之性皆惟眾生根塵相對一念分別識心是故離心無境離境無心以是之故彌陀相好乃我本性之彌陀十萬億剎乃吾唯心之淨土故曰元是自心不踰當念是故結云以性具故不從他得四釋本經稱名疏又復當知彌陀已證究竟第一義諦一稱嘉號萬德齊彰罪銷塵劫福等虗空何況一日至七日耶良由法藏本願設我得佛十方眾生至心信樂欲生我國乃至十念若不生者不取正覺既承彼佛因中願力果上光明執持名號功德無量臨終見佛決定無疑鈔前釋事中一念乃約憶念彼佛相好光明而說似濫觀經觀佛為念用心雖同揀境則異今則的指執持名號而為所緣之境故曰一稱嘉號萬德齊彰文中乃釋或者之伏疑疑者云佛有萬德應觀三身云何但稱名號即得往生故殷勤示之曰又復應知等云云文約兩義以釋其疑一者名實相稱二者法藏本願一名實相稱者四明云圓極之果所有名字一一不虗究竟成就葢其所召皆真極故故大經云世諦但有名無實義第一義諦有名有實義佛是究竟第一義諦故又今彌陀既已證乎究竟第一義諦故一稱嘉號萬德齊彰彌陀萬德慧日既以俱體齊彰眾生黑暗罪瑕自然當念消乎塵劫罪性本空虗而不實者既銷則稱名功德福等虗空者自生一稱佛名功德尚然況一日至七日一心不亂執持名號則無罪而不滅無福而不生臨命終時往生淨土斷斷乎不唐捐矣良由下第二示法藏本願云云葢諸佛本願毫無虗假以彌陀因中發四十八願已即便經歷曠劫修行以填願海願海既滿無量法財一時發現是故今取極樂世界攝受有情而娑婆眾生已信是事仍發往生之願以投願海復修稱名之行以增行山萬流歸海同一醎味須彌攝物共一帝青自然而然原非勉強是故解文末後合二義以結斷疑根云既承彼佛因中願力果土光明執持名號劫德無量臨終見佛決定無疑五訂此經訛脫三初出古本疏靈芝疏載襄揚石本於一心不亂下有云專持名號以稱名故諸罪銷滅即是多善根福德因緣次訂訛脫疏彼石經本六朝人書竊疑今本相傳訛脫鈔解中既云今傳訛脫凡讀習者應依古本而增正之三況顯持名疏況我彌陀以名接物耳聞口誦無邊聖德攬入識心永為佛種頓除億劫重罪獲證無上菩提信知非少善根實謂多功德也鈔凡諸佛應身接物有乎四益一以形益現身是也二以光益放光是也三以聲益說法是也四以通益現神足是也惟阿彌陀四益之外更加之以名接物以其有本時所發誓願故也餘之四接其攝機也狹惟以名接物其攝機也廣既彌陀以名而接物故眾生得以耳聞而口誦豈惟一稱嘉號而萬德齊彰且又無邊聖德攬入識心永為佛種除罪證道不可思議其善根功德豈小小哉竊原淨土法門其所開示一也惟所修之方厥門雖多要其所歸不出二種一曰正修二曰助行於正修中其法有二一觀想二持名專心作觀則文載觀經專心持名則文載此經若觀想與持名兩者並行則文載般舟三昧經今欲明其義則有五種不同一名實不同名即佛界假名實則佛界五陰與夫國土觀五陰實法則觀經所示佛菩薩三輩往生等九觀觀依報國土則觀經所示日氷地樹等六觀若般舟經所示但觀佛身正報實法而已今經所示但持假名故曰聞說阿彌陀佛執持名號是則依此經修但以稱佛名號六字音聲而為所緣之境無以觀佛相好以濫經宗所謂一稱嘉號萬德齊彰舉假名而全收實法故知此經所示乃提綱挈領之法門也二緩急不同如觀經所示十六妙觀始修日觀必待成就然後改觀觀水觀氷等緩緩而進辦在一生此經所示持名方法極其長期在于七日其次或六或五乃至一日執持名號一心不亂并觀經下輩往生大彌陀經臨終十念即得往生故知此經所示乃以急勝緩之法門也三難易不同觀經修觀以凡夫之人心想嬴劣故先示日觀西向以攝其心待心靜細然後觀水觀冰乃至像觀成就然後觀佛真身此必久修成熟之機乃可行之今經所示初心凡夫但是有口能稱有信能念皆可修之故知此經所示乃至簡至易之法門也四純閒不同十六觀門初心修者跏趺入定然後可觀出定歷緣非其境界若執持名號不間閒忙不拘動靜行住坐臥皆可修之故知此經所示乃至捷至徑之法門也五攝機不同若依觀經所修惟被上根故所修之機狹而不廣稱名之法不擇賢愚不揀男女若貧若富若貴若賤皆可修之故知此經所示乃攝機極廣之法門也是則此經所明境觀只須惟約執持名號為所觀境若事若理悉以此而解說修行不必更約觀佛相好而雜附之三感果二初分科三感果二初感聖迎接二釋經二初感聖迎接二初列經其人臨命終時阿彌陀佛與諸聖眾現在其前二釋義四初隨品所感疏靈芝云聖眾現前亦有多種或真佛化佛觀音勢至隨其品位委在觀經鈔真佛者彌陀之應身也此有二種一勝應二劣應化身則從應身又變化其身而來接引準例觀音勢至亦有真之與化隨其此方念佛功行破惑伏惑以感何身而接引之次破斥謬解二初序謬疏或謂臨終見佛以為魔者或云自心業現實無他佛來者鈔世間禪門淺悟教苑謬承多作此說二斥過疏斯葢不知生佛一體感應道交自障障他為過非淺鈔凡是見佛須論感應若平居參禪或修空觀既宗掃蕩佛亦不立苟有所見悉為魔境或功用顯著心佛自現亦須觀空弗生著相今既念佛求生極樂臨終見佛此因妙感復由生佛本是一體感應道交法爾如是若不明此妄論邪談不惟自障兼亦障人於此法門大成罪過三引證疏法藏本願云眾生發願欲生我國臨命終時假令不與大眾圍繞現其人前者不取正覺鈔彌陀夙昔既有弘願眾生又能依願求生此正生佛天性相關感應道交不可思議二正念往生二初牒科二正念往生二釋經二初列經是人終時心不顛倒即得往生阿彌陀佛極樂國土二釋義二初明佛力攝持疏乘彌陀願力攝持不為平昔妄想攀緣傾動其心正念現前故云心不顛倒鈔娑婆眾生雖能念佛浩浩見思實未伏斷而能垂終心不顛倒者原非自力而能主持乃全仗彌陀乘大願船而來拔濟雖非正念而能正念故得心不顛倒即得往生次明自他兼濟疏因前念佛罪滅障除淨業內熏慈光外攝離苦得樂一剎那閒故云即得往生等鈔經云至心念佛一聲能滅八十億劫生死重罪夫生死未來所受之報障也重罪往昔所造之業障也業從心造過去世時之煩惱障也八十億劫言過去所起煩惱所造惡業極長之時分也如是長時三障一稱佛名而能頓滅者此由行人念佛智慧之日合佛慈悲智慧之日二慧日光重重相照故無煩惱之暗而不燭無罪業之幽而不照亦無生死之縛而不解離苦得樂即得往生豈虗謬哉是則雖由慈光外攝而又全憑念力至心寄語行者尋常稱名七日之期而功始一日一日之期而功始一時一時之期而功始一念果能一念至心而滅除眾罪則一時一時之功當何如哉一日七日之功又何如哉成山之功始於初簣求生淨土者尚勉之哉故普智大師引涅槃經云譬如少火能然一切草木如少金剛能壞須彌山所以觀經下品中說火車相現尚得往生皆由慙愧之心信力堅固方能滅惡若觀世人為善心輕為惡心重誠恐善未敵惡何以得生淨土請以現事驗之對佛像則不如接大賓之恭謹學經法則不如求財利之勤劬毀他則氣粗語滑讚彼則氣緩語澁或以惡之則覆善揚惡好之則掩短美長凡此用心方沉惡趣欲以少善消多惡而求生者難矣哉四結勸二初牒科四結勸二釋經二初列經舍利弗我見是利故說此言若有眾生聞是說者應當發願生彼國土二釋義疏淨業功勛願為最要是故如來再三勸勉鈔淨業之宗雖具三要願為船舵又居其先信行有所要制直捷往生無疑三諸佛稱讚二初牒科三諸佛稱讚三初釋迦稱讚二釋經三初釋迦稱讚二初列經舍利弗如我今者讚嘆阿彌陀佛不可思議功德之利二釋義三初釋稱讚所指疏牒前稱讚依正莊嚴願行功德利益無量以例六方諸佛悉亦如是稱讚勉令生信鈔前所稱讚依正莊嚴指所詮之體也願之與行指所詮之宗也功之與德指所詮之力用也如是利益無量無邊尚不可以心思況可以言議金口叮嚀勉令生信讀是經者可不修之次明秦譯之簡疏唐譯具有十方此惟六方略去四維耳鈔歷代譯經惟什師順此方之機而十一略之無論其他即此經十方佛讚而略去其四人皆傳誦似有不期然而使之然者亦可謂得契理契機妙也三指科判之失疏孤山疏此後即屬流通今謂諸佛稱讚是本經題一經要旨合歸正說鈔孤山判屬流通者意謂六方佛讚是使流通故也不知此讚是本經題目豈有經義屬於正宗而經題又屬流通耶二諸佛同讚二初牒科二諸佛同讚六初東方二初現相表彰二釋經二初東方二初現相表彰二初列經東方亦有阿閦佛須彌相佛大須彌佛須彌光佛妙音佛如是等恒河沙數諸佛各於其國出廣長舌相遍覆三千大千世界二釋義四初釋佛名五初釋阿閦佛疏阿閦佛此云不動法身常住無遷變故鈔論佛三身悉無遷變以報身契法證一性故應身從體起用全用在體故今但云法身者以讓此身非修成故也次釋須彌相佛疏須彌此云妙高佛相如之妙則三德圓融高則逈出因位鈔三德圓融簡異偏證逈出因位簡異分真乃圓頓妙覺果佛若曰佛相如之乃所現勝應被高山王機說華嚴等經之佛亦可名為報身三釋大須彌佛疏大須彌者佛德高大如須彌盧超過眾山鈔高則位齊究竟廣則德備法界超過因位稱大須彌四釋須彌光佛疏須彌光者光如須彌映蔽眾山鈔報智光明豎高橫遍因位偏乘悉皆映蔽五釋妙音佛疏妙音者音聲美妙說法稱機鈔音聲雖美不能說法固非妙也雖能說法若不稱機亦非妙也次釋恒河沙疏恒河亦云殑伽河在天竺無熱池側廣四十里其沙至細興水同流言其多也鈔無熱池即梵語阿耨達也有四口從東南角白象口所出之水流入恒河沙細如麵佛常於此河之側說法凡指數多必以此河之沙為喻令易曉故三釋廣長舌相疏出廣長舌表無虗妄無量劫來口離四過故感此相鈔凡人之舌隨其報相各有廣長若此方貴人舌䑛至鼻然能可長可短則以之為貴苟長而不能縮短而不能伸此必生前好演是非為短長之說故感今生如此之報以驗世人不妄語者必得其所惟佛世尊多劫實語故舌相廣長超異常人然有常相現相不同若常相者縮之雖常在口伸之則能覆面上至髮際此曾令外道生信所示如此也若夫現相又有大小不同略舉二經法華言高而不言廣故曰上至梵世此經言廣而不言高故曰遍覆三千大千世界要知二經大小相齊但文互略故各舉一邊悉是表無虗妄現此以敦聞者之信耳又義法華明豎出三界故但言高此經明橫出三界故但言廣若即豎而橫即橫而豎文雖互略義必相齊四釋三千大千疏三千大千世界俱舍頌云四大洲日月須彌盧欲天梵世各一千名一小千界此小千千倍說名為中千此千倍大千皆同一成壞謂萬億四天下總為一佛土也鈔前文已釋須者往尋二發言勸信二初牒科二發言勸信二釋經二初列經說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經二釋義二初釋令生深信疏決定不虗故言誠實十方世界恒沙諸佛異口同音說此法門令生深信鈔十方諸佛說誠實言者謂淨土法門非但我釋迦如來於此經中以決定不虗之言而為大眾宣說即十方諸佛亦異口同音說如是決定可信誠實之法也此段經義昔慈恩法師謂觀此經勢葢他方諸佛告自國聽眾釋迦轉引彼佛意言證彼西方令此會眾生信敬也而靈芝法師所說又自不同謂正當釋迦說此經時十方諸佛同時勸讚令信是經余謂準前既云亦有要當以慈恩為正也次釋是本經題疏稱讚下十六字是本經題上八字言極樂依正莊嚴行願因果下八字言六方稱讚下文釋云聞是經受持者及聞諸佛名者皆為諸佛護念不退菩提鈔準慈恩師意則下八字總是釋迦與諸佛皆說淨土法門而此唯心淨土本性彌陀之旨皆為諸佛之所護念越溪澄師云此經有四不可思議一者依報雖是同居而體是寂光二者正報雖是應身即法即報三者修因四者感果七日持名即感聖果因果不二皆是不可思議功德二南方二初牒科二南方二初現相表彰二釋經二初現表彰二初列經舍利弗南方世界有日月燈佛名聞光佛大𦦨肩佛須彌燈佛無量精進佛如是等恒河沙數諸佛各於其國出廣長舌相遍覆三千大千世界二釋義五初釋日月燈佛疏日月燈光表佛三智鈔三智之中一切種智最為尊勝取喻如日無幽不燭而寰宇居尊道種智出假利物導利羣萌取喻如月長養萬物各得華茂一切智破見思惑於空得證取喻如燈能除室暗使獲智明次釋名聞光佛疏名聞光者名聞十方如光徧照鈔三德智光遍照十方有名稱之實故有名稱之聞三釋大𦦨肩佛疏大𦦨肩者肩表二智𦦨喻照理鈔左肩表實智右肩表權智二智之燄能照權實之理喻如𦦨肩四釋須彌燈佛疏須彌燈者須彌高出眾山燈表化他之用鈔高出眾山表自證之體備乎四德高出因位化他之用即用即體利無不妙五釋無量精進佛疏無量精進者方便度生未嘗休息眾生無量悲智亦然鈔眾生無量言數多也未嘗休息言時長也如來之悲智方便度盡眾生不雜不退故名無量精進二發言勸信二初牒科二發言勸信二列經說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經三西方二初牒科三西方二初現相表彰二釋經二初現相表彰二初列經舍利弗西方世界有無量壽佛無量相佛無量幢佛大光佛大明佛寶相佛淨光佛如是等恒河沙數諸佛各於其國出廣長舌相遍覆三千大千世界二釋義七初釋無量壽佛疏無量壽佛者靈芝云同名甚多決非法藏所成之彌陀也慈恩云設若彌陀自讚於理何妨謂稱讚此法門令生深信非自伐其善也鈔靈芝謂決非極樂彌陀者以其十方諸佛各於本國稱讚說此彌陀一經令眾生聞者生信受持發往生願若彌陀自讚者豈令極樂眾生又求生別有極樂淨土乎況自伐其善者祇可誡乎下凡若如來者自稱我是如來應供等勉令聞者咸來聽法成乎三慧豈自伐之言乎次釋無量相佛疏無量相者相好無量也鈔相好無量者如盧舍那具足十華藏海微塵相好阿彌陀佛具足八萬四千相好光明龍女之讚釋迦微妙淨法身具相三十二以八十種好用莊嚴法身皆可名為相好無量也三釋無量幢佛疏無量幢者功德無量超勝如幢也鈔幢有二義一高出有超勝義二八方有摧邪義今取高出故釋云超勝四釋大光佛疏大光者廣大光明暎蔽一切也鈔智慧光明極其廣大映蔽凡小及以因人五釋大明佛疏大明者佛智大明無惑不破也鈔佛證三智皆有大明能破三惑及以二死既能自破亦能破他六釋寶相佛疏寶相者相好殊特如寶可貴也鈔世閒之寶莫貴於善如來之寶莫貴相好可尊可重故喻於寶七釋淨光佛疏淨光者淨表法身光表報應也鈔分字而釋故名以義表若合釋者光表三身淨表三身證極清淨超諸因位金光明經云如來遊於無量甚深法性超諸菩薩所行清淨是也二發言勸信二初牒科二發言勸信二列經說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經四北方二初牒科四北方二初現相表彰二釋經二初現相表彰二初列經舍利弗北方世界有𦦨肩佛最勝音佛難沮佛日生佛網明佛如是等恒河沙數諸佛各於其國出廣長舌相遍覆三千大千世界二釋義五初釋𦦨肩佛疏𦦨肩者雙照真俗如肩發𦦨鈔兩肩表權實二智今兩肩發𦦨表二智𦦨光照真俗二理也次釋最勝音佛疏最勝音者梵音深妙超勝一切鈔佛凡說法以八音四辨而宣暢之所詮之理最為深妙一切因人所不能比故言最勝三釋難沮佛疏難沮者法身堅固不可沮壞鈔佛具三身舉一即三法身既其堅固報應亦必同之要之皆不可沮壞也四釋日生佛疏日生者如日初昇無幽不燭鈔佛日行空皆能燭幽惟初生日燭幽義顯故偏言之五釋網明佛疏網明者智明如網遍覆十界鈔佛之智慧光明猶如因陀羅網既互照莊嚴之不盡亦徧覆十方之無餘可表慈悲蔭祐十界二發言勸信二初牒科二發言勸信二列經說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經五下方二初牒科五下方二初現相表彰二釋經二初現相表彰二初列經舍利弗下方世界有師子佛名聞佛名光佛達磨佛法幢佛持法佛如是等恒河沙數諸佛各於其國出廣長舌相遍覆三千大千世界二釋義六初釋師子佛疏師子如師子王摧伏羣獸鈔師子為百獸中王身力威猛吼音雄震力能伏獸聲能裂腦喻佛從意輪現身通口輪說大法眾生莫不歸依邪魔悉皆摧伏次釋名聞佛疏名聞者名稱普聞無量世界鈔佛有無量德應有無量名皆有稱名之實一一不虗一一諸名聞於無量世界莫不使聞者仰名飡德而獲利益三釋名光佛疏名光者名如日光遍照一切鈔即智光而為名光智隨名遍而光依智照四釋達磨佛疏達磨翻法所證法身軌持萬化鈔陽春到處萬物遂生法身遍處萬物咸軌隨緣不失規矩真如不變難思五釋法幢佛疏法幢法性如幢高出羣有鈔法性高出者乃出纏之法性也諸佛眾生共而不共者以此六釋持法佛疏持法以中道實智持二邊法鈔空有不能持中實者下不能御上也中實而能持二邊者勝能統劣也既不失中道亦不失二邊二發言勸信二初牒科二發言勸信二列經說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經六上方二初牒科六上方二初現相表彰二釋經二初現相表彰二初列經舍利弗上方世界有梵音佛宿王佛香上佛香光佛大𦦨肩佛雜色寶華嚴身佛娑羅樹王佛寶華德佛見一切義佛如須彌山佛如是等恒河沙數諸佛各於其國出廣長舌相遍覆三千大千世界二釋義十初釋梵音佛疏梵音者梵即淨也法音淨妙聞者適悅也鈔佛以已證清淨妙法八音四辨悅懷而說契理契機無不適悅次釋宿王佛疏宿王如月照夜星宿中王鈔三乘聖眾猶如星宿佛清淨月如宿中王以清淨法蔭諸煩熱二釋香上佛疏香上眾德如香超諸因位鈔佛有五分身香能總一切萬德人所不能及故以香上稱之四釋香光佛疏香光五分法香如光破暗鈔佛名香光莊嚴者以有五分法身之香徧照法界破諸眾生不淨之暗故也五釋大𦦨肩佛疏大𦦨肩大智發光雙照二諦鈔諸法實相不出真俗故能照智祇惟權實故以兩肩發𦦨以表彰智境難思六釋寶華嚴身佛疏寶華嚴身者萬行因華如寶莊嚴法性之身鈔佛身以諸相為眾寶莊嚴者正表果德以萬行因華而莊嚴之也既以是而嚴身復以是而為號欲令眾生覩相莫不志願思齊七釋娑羅樹王佛疏娑羅此云堅固喻法身無變易故鈔西天以娑羅為樹中王震旦國惟峨眉王屋天台有之樹有五德一婆娑蔭覆二密幄鱗砌三冬夏不凋四樹身堅固五花色香美以是之故稱樹中王可喻如來大慈普被萬德具足常住寂滅究竟堅固相好莊嚴解中取堅固之義以喻法身為其能統眾德故也八釋寶華德佛疏四德如寶如花開敷鈔佛之所寶莫貴四德芬芳煒燁如花開敷九釋見一切義佛疏見一切義洞達諸法甚深義故鈔諸法十界也義趣者三諦也惟佛與佛乃能究盡故稱見一切義佛十釋如須彌山佛疏如須彌山者如妙高山眾聖中尊鈔須彌山四寶所成故稱為妙表出眾山故稱為高喻佛究竟常樂我淨一切因人莫能過之二發言勸信二初牒科二發言勸信二釋經二初列經說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經三徵釋經題二初分科三徵釋經題二初徵二釋經二初徵二初列經舍利弗於汝意云何何故名為一切諸佛所護念經二釋義疏佛自徵起下文釋之二釋二初牒科二釋二釋經二初列經舍利弗若有善男子善女人聞是經受持者及聞諸佛名者是諸善男子善女人皆為一切諸佛之所護念皆得不退轉於阿耨多羅三藐三菩提二釋義四初約三經釋疏聞是經者教經也受持者行經也不退菩提菩提是本有性德理經也三經即是三德秘藏圓該一切舒之則彌綸法界卷之則攝在一經故使受持之人恒沙如來護念不退菩提也鈔聞是下釋成三經三經下會歸三德理經即法身德行經即般若德教經即解脫德圓該一切者明三德無所而不具也舒之則彌綸法界者一即一切也卷之則攝在一經者一切即一也能如是了則彌陀一經充滿法界可也十方法界皆具此經可也又須了達教行理經舉一即三餘二易知今但明行經如執持名號一心不亂行經般若德也所持名號萬德全彰理經法身德也念念滅除生死重罪教經解脫德也受持之人如來護念其所護念不在茲乎次約附文釋疏靈芝云聞是經受持者牒前依正莊嚴修證因果之文及聞諸佛名者牒前六方稱讚之文也護謂覆護不使魔嬈念謂憶念不令退失唐譯云聞是經已深生信解必為十方十殑伽沙諸佛世尊之所攝受鈔在文可知三約果號釋疏阿耨多羅此云無上三藐此云正等三菩提此云正覺佛之果號四約功用釋疏靈芝云博地凡夫業惑纏縛流轉五道百千萬劫忽聞淨土志願求生一日稱名即超彼國諸佛護念直趣菩提可謂萬劫難逢千生一遇鈔萬劫難逢千生一遇亦有泛的不同如雖聞大法獲種善根未必即能頓超生死以其輪迴難出大道難成故也今所說法信受奉行一日之功超三僧祇諸佛護念的在是乎三流通分二初牒科三流通分二初佛勸信受二初勸信二釋經二初佛勸信受二初勸信二初列經是故舍利弗汝等皆當信受我語及諸佛所說二釋義疏叮嚀告誡勉令生信我及十方諸佛所說二顯益二初分科二顯益二初由因克果二初正示二初修因二釋經二初由因克果二初正示二初修因二初列經舍利弗若有人已發願今發願當發願欲生阿彌陀佛國者二釋義疏已即過去今即現在當即未來發願是因得生是果有願必生萬無一失二感果二初牒科二感果二釋經二初列經是諸人等皆得不退轉於阿耨多羅三藐三菩提於彼國土若已生若今生若當生二解義疏是諸下唐譯云一切定於無上菩提得不退轉於彼下唐譯云一切定生無量壽佛極樂世界清淨國土是故皆應深心信解發願往生勿行放逸鈔是諸人等指前三時發願之人皆得不退菩提者非是他人祇是於彼國土已發願者則若已生今發願者則若今生當發願者則若當生然願非虗設發必導往行非浪施修必因信三者圓滿必得往生若得往生決不退轉二結勸二初牒科二結勸二釋經二初列經是故舍利弗諸善男子善女人若有信者應當發願生彼國土二釋義二初明揀機疏孤山曰若有信者應當發願則揀出無信之人鈔採佛法寶須假信手苟無手人徒入寶山次明他力疏夫求生淨土者是假他力彌陀願攝釋迦勸讚諸佛護念三者備矣苟有信心往生極易如渡大海既得巨航仍有良導加以順風必能速到彼岸矣若其不肯登舟遲留險道者誰之過歟鈔假他力者乃取多分為言以念佛三昧於功用但稱名於期限方七日苟不多假他力云何即得往生他力有三一彌陀願攝喻如巨航二釋迦勸讚喻如良導三諸佛護念喻如順風惟其如此是以速到慈航已備而不肯登舟甘心於羅剎鬼國嗜片時之五欲知必墮落而不之恤亦愚也哉二舉難況易二初牒科二舉難況易二初我讚諸佛二釋經二初我讚諸佛二初列經舍利弗如我今者稱讚諸佛不可思議功德二釋義三初明二譯不同而同疏此明諸佛互讚唐譯但云稱揚讚歎無量壽佛今言稱讚諸佛者以佛佛體同故次引經證不同而同疏華嚴云一切諸佛身唯是一法身一身一智慧力無畏亦然三結二譯不同而同疏是故稱讚彌陀即是讚諸佛也鈔華嚴云一切諸佛各有自受用身及以化境則彼此各各不明也唯是一法身等則同也此即三德三身等種種三法莫不皆同豈非稱讚阿彌陀即是稱讚諸佛乎二諸佛讚我二初牒科二諸佛讚我二初述彼讚詞二釋經二初述彼讚詞二初經彼諸佛等亦稱讚我不可思議功德而作是言釋迦牟尼佛能為甚難希有之事能於娑婆國土五濁惡世劫濁見濁煩惱濁眾生濁命濁中得阿耨多羅三藐三菩提為諸眾生說是一切世閒難信之法二釋義二初泛明諸佛同讚疏彼諸佛等亦稱讚我則彌陀亦同諸佛稱讚釋迦也鈔彼此雖各相讚而其所讚正自不同如釋迦之讚彌陀則以能大慈與樂取土攝受彌陀之讚釋迦則以能大悲拔苦現土折伏雖有互用實亦互益故拔苦正欲與樂興樂正欲拔苦慈悲兼濟與拔並施若嚴父之與慈母道並行而不相悖也次述彼諸佛讚詞三初明因德立稱疏釋迦此云能仁牟尼此云寂默能仁則大慈應物寂默則大智冥理鈔大智冥理自證之體也大慈應物化他之用也今正言應用如來應於五濁惡世是以號為能仁次明稱名之德疏能為甚難希有之事者下文自釋一於五濁得菩提二為眾生說難信之法鈔釋迦之所以稱能仁者葢有二能焉一於難得菩提之土而得此菩提是故號為寂默葢能於非寂非默之境而得寂默菩提此一能也二於剛強濁惡不解之土而說此妙法是故號為能仁葢能於尠信尠解之人而說難信之法是故號為能仁此二能也三釋所化之國二初釋娑婆疏梵語娑婆此云堪忍以眾生堪能忍受三毒諸煩惱故鈔三毒者貪瞋痴也總該五利使五鈍使見惑八十八使思惑八十一品也皆稱煩惱者煩如煩熱惱即惱亂不得須臾清涼自在亦可謂之極苦矣然而恬然忍受不特不以之為苦猶且以之為樂此其所以稱堪忍也次釋五濁二初總釋疏五濁者楞嚴云譬如清水投之沙土土失留礙水亡清潔汩然渾濁由此五濁理水亡清鈔清水喻真空之理沙土喻見思并所召果色一理一惑相織妄成由是水失清淨惑失留礙故曰由此五濁理水亡清名之為濁但此經五濁興楞嚴粗細不同事理咸異若會而歸之又不同而同也次別釋五初劫濁疏劫者梵語劫波此云時分從減劫人壽二萬歲時即入劫濁四濁增劇聚在此時瞋恚增劇刀兵起貪欲增劇饑饉起愚痴增劇疾疫起三災起故煩惱倍隆諸見轉熾眾濁交湊如水奔昏鈔劫名時分以世界為體世界有成住壞空為四大時分每一時分有二十番增減之久今是住劫減劫之末減劫之初人壽有八萬歲過一百年減一歲減至二萬歲即入劫濁濁未增盛自爾已後眾生三毒日增月盛至釋迦時人壽百歲故曰四濁增劇聚在此時刀兵等者小三災也生當此時災起不常職由人心三毒所感然猶未至太劇至減人壽十歲之時此小三災方名極隆世界眾生將無噍類謂之子德減父德子年減父年然後人心厭苦漸能遷善由是又過百年增壽一歲壽逾增而善逾進增至八萬歲而後止謂之子德增父德子年倍父年如是凡經二十番然後入於壞劫則水火風大三災次第發現復經如是二十番時方入空劫空二十番時世界復成亦二十番時方入住劫當釋迦時正住劫第九番減劫之時故曰能於五濁惡世等次釋見濁疏見者身見邊見戒取見取邪見五利使乃至六十二見等也鈔身見者謂於五陰中妄計有身強立主宰恒起我見執我我所是名身見邊見者謂計我身或斷或常執斷非常執常非斷但執一邊是名邊見戒取者謂於非戒之中謬以為戒強執勝妙希取進行是名戒取見取者謂於非真妙法中謬計涅槃心生取著妄計所得為勝是名見取邪見者謂邪心取理顛倒妄見不信因果斷諸善根作闡提行是名邪見出涅槃經六十二見者謂外道之人於色受想行識五陰法中每一陰起四種見謂計色大我小我在色中我大色小色在我中離色是我即色是我色陰既爾餘四亦然成二十見約過去現在未來三世論之成六十見加斷常二見為根本共六十二出涅槃經五利使者利即快利之義謂此五種妄惑動念即生造次恒有使即驅使之義謂諸眾生為此五種妄惑驅逐心神流轉三界無有出期故名使也三釋煩惱濁疏煩惱者貪瞋痴慢疑五鈍使乃至百八煩惱等是也鈔貪即引取無厭也謂諸眾生貪著世閒色欲財寶恣縱心情而無厭足瞋即忿怒謂諸眾生於違情境上起諸瞋恚惱亂自他痴即迷惑不了謂諸眾生以迷心緣境於一切法不能明了慢即自恃輕他謂諸眾生自恃種姓富貴有德有才輕慢於他疑即猶豫不決謂諸眾生迷心乖理不能通達法相五鈍使者鈍即遲鈍謂此五種妄惑既非動念即生亦非造次恒有故言鈍也百八煩惱者昏煩之法惱亂心神故名煩惱謂眼耳鼻舌身意六根對色聲香味觸法六塵各有好惡平等三種不同則成十八煩惱又於其中起苦受樂受不苦不樂受復有十八共三十六種更約過去現在未來三世各有三十六種總成百八煩惱也四釋眾生濁疏眾生者攬五陰見慢果報立此假名鈔眾者眾也攬五陰實法立眾生假名而言見慢果報者約由因感果為義見慢即過去利鈍二使之因果報即現在五陰之果五釋命濁疏命者剎那生滅摧年促壽鈔釋迦現世人壽八十雖名曰短較年猶長復以年而較月以月而較日漸漸相較至于剎那一念有六十剎那剎那有六十生滅所謂豈惟年變兼又月遷以至喻云如火成灰念念銷殞殞亡不息決知此身終從變滅葢世人之壽為八相所遷所謂小四相遷大四相故曰剎那生滅摧年促壽四結皆由悲願疏悲華經云吾以大悲本願力故處此濁惡不淨國土鈔濁惡國土眾生悲苦正與釋迦悲願相應所謂下合六道眾生同一悲仰若夫淨土眾生仰樂正與彌陀慈願相應所謂上合十方諸佛同一慈力然而釋迦之悲非不兼慈彌陀之慈非不兼悲今對二土淨穢故偏言一邊耳五結難信之法疏夫念佛三昧不揀賢愚不擇貴賤不論久近不分善惡唯取決定信心臨終惡相十念往生此乃具縛凡愚屠沽下類剎那超越成佛之法可謂一切世閒甚難信也鈔夫佛法大海一味平等固於賢愚貴賤無所分別若言臨終惡相十念往生惟淨土一門方有是事一切世閒實為難信可謂大乘中之大乘了義中之了義也二顯示不虗二初牒科二顯示不虗二釋經二初列經舍利弗當知我於五濁惡世行此難事得阿耨多羅三藐三菩提為一切世閒說此難信之法是為甚難二釋義二初明釋迦具足二難疏孤山曰五濁界中行難行之行而得菩提其事已難復說此難信之法二事兼行是甚難也諸佛讚我豈虗言哉鈔諸佛同讚釋迦者謂具二難故一者於難成道之國而能成道二於難生信之人而說此法對顯諸佛則成二易矣次顯二土修行難易疏慈雲云五濁得道為難淨土修行則易鈔慈雲大師云娑婆得道有十難一不常值佛二不聞說法三惡友牽纏四羣魔惱亂五輪迴不息六難逃惡趣七塵緣障道八壽命短促九修行退失十塵劫難成淨土修行有十易一常得見佛二常聞法音三聖賢集會四遠離魔事五不受輪迴六永離惡趣七勝緣助道八壽命無量九入正定聚十一生行滿難易之狀明言如此可不捨難而取易乎二眾喜奉行二初牒科二眾喜奉行二釋經二初列經佛說此經已舍利弗及諸比丘一切世閒天人阿修羅等聞佛所說歡喜信受作禮而去二釋義五初約機收簡疏一切世閒總收四眾十界別舉三善道者多受化之機故也天謂梵釋欲色等天阿修羅此云非天富貴同天而多諂誑無天行故等者等於八部鬼神同聞眾也鈔解中明經所敘聞法之機有收有簡一切世閒則總收四眾十界四眾固是常聞法者十界則兼收四趣謂所收機若是之廣也天人修羅則簡去餘趣惟舉三善道也謂所受化之機若此之多也此且就一往約餘經者為言若極樂法門如大本中說臨終地獄相現以至蜎飛蠕動皆以願力攝之令生彼國則所攝之機誠宜四眾十界無所而不收也次明益所以疏孤山曰聞所未聞故歡喜信受重法尊師故作禮而去三獲益淺深疏言歡喜者義該深淺或得歡喜益或證理入歡喜地鈔得歡喜益者約世界悉檀判也入歡喜地者約第一義悉檀判也四引證深益疏故大本結益無量眾生發菩提心那由他人得法眼淨鈔發菩提心位在大乘得入理益得法眼淨位在小乘得入理益經又云信受奉行則又獲為人悉檀生善之益惟闕對治悉檀破惡之益既有三益應亦該之五流通永永疏宣布十方垂於萬世盡未來際利樂無窮鈔流通之法大要兩種一自行二化他自行又有兩種一如說修行即七日持名一心不亂二讀誦經文隨文解義昔梁朝有道珍法師嘗於廬山念佛作水觀忽夢江水瀰滿眾人乘船言往西方珍言道珍一生修西方業可附我而去船上人云法師雖講經甚大未誦彌陀經并往生呪未浴僧淨業未圓不得往也珍於是感泣夢覺後乃廢講業專誦此經及往生呪并營僧浴至垂終夜異光明耀峯頂如列數千炬神人持珍臺而至請師往生故知流通願生不可以不讀誦也二化他者即純以此經為人演說勸他念佛願生極樂或書寫解釋莫非其行以此化他功德回向淨土發願往生昔四明昝學諭常以擘窠圖印施勸人念佛有計公桃源鐵工也年將七十兩目喪明初受一圖念滿三十六萬聲念至四圖兩目瞭然如是三載念滿十七圖一日念佛忽然氣絕半日復甦曰我見佛菩薩令分六圖與昝學諭是勸導之首分一圖與李二公此是表圖之人囑其子往謝學諭言訖沐浴西向坐逝以此而觀勸人念佛亦往生之行況昝學諭既能勸人豈不能自念自利兼人功德倍隆往生土品位必高附刻拔一切業障根本往生淨土神呪捺摩阿彌多婆夜哆他伽哆夜二哆地夜他三阿彌利都四婆毗五阿彌利哆六悉躭婆毗七阿彌利哆八毗伽蘭帝九阿彌利哆十毗伽蘭哆十一伽彌膩十二伽伽那十三枳多迦利十四娑婆訶十五祐師云呪是梵語此方之人持誦不經師授訛謬實多此呪載養字函書者節句差誤後人沿襲遂失其正龍舒淨土文樂文類等不原所以執之為是而反以正為誤聞義不從謬之甚矣請以楞嚴呪等比對可知今依正本刊印普勸誦持使密語流行不失其正也余謂祐師既凖楞嚴呪節正句逗則第四句應同第六句四字為句移第五句都字歸上為阿彌利都第五句但婆毗二字為句又師所撰淨土指歸中亦載此呪謂哆字雖音多曷切不可作入聲重呼當與帶字同音此亦深有所以葢哆字若依篇韻應讀作侈今多曷切讀作帶者乃梵音彈舌之聲葢為東華無彈舌聲字故譯人凡遇彈舌聲即以此方字加之以口但遇有口字悉須彈舌今哆字加口而讀作帶便成彈舌之聲故也刻圓中鈔䟦佛說阿彌陀佛一經其猶富貴人家家常之飯譜堂室之物帳衣服之欵記苑囿之花疏不過直紀其事以付當家兒使其守之弗失用之不窮又何必贅以註脚疣以鈔釋第慮少年子弟厭膏粱而莫辨菽麥侈錦繡而罔識桑麻是以長者之側臣佐吏民註記券疏者得握筆而進矣吳門蘧庵法師之略解余首登講席時以之發軔經三十餘年恍焉若新然解雖稱略于中多涉教門關鑰乃為初學鈔出圓中已證惟心淨土本性彌陀者必以是為蒭狗若失方問徑於清泰者不無少裨云四明延慶法子圓復募刻流通余嘉其有自益公人之志故復為之䟦皇明天啟五年冬傳天台無盡燈僧書
